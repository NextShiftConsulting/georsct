# New Orleans, LA — FloodRSCT scenario config

scenario: new_orleans
state_fips: "22"
# 5-parish Greater New Orleans metro (expanded from Orleans-only)
county_fips:
  - "22051"   # Jefferson Parish
  - "22071"   # Orleans Parish
  - "22075"   # Plaquemines Parish
  - "22087"   # St. Bernard Parish
  - "22103"   # St. Tammany Parish
zcta_state_filter: "LA"

events:
  katrina2005:
    disaster_declaration: DR-1603-LA
    start_date: "2005-08-29"
    end_date: "2005-09-10"
    nhc_storm_id: AL122005
    peak_window: ["2005-08-29", "2005-08-30"]

  isaac2012:
    disaster_declaration: DR-4080-LA
    start_date: "2012-08-28"
    end_date: "2012-09-05"
    nhc_storm_id: AL092012
    peak_window: ["2012-08-28", "2012-08-30"]

  barry2019:
    disaster_declaration: DR-4458-LA
    start_date: "2019-07-11"
    end_date: "2019-07-15"
    nhc_storm_id: AL022019
    peak_window: ["2019-07-12", "2019-07-14"]

  ida2021:
    disaster_declaration: DR-4611-LA
    start_date: "2021-08-29"
    end_date: "2021-09-05"
    nhc_storm_id: AL092021
    peak_window: ["2021-08-29", "2021-09-01"]

# USGS NWIS gauge sites
usgs_anchor_sites:
  - "07374000"  # Mississippi River at New Orleans
  - "07375500"  # Lake Pontchartrain at Lakefront
  - "295503090072600"  # Industrial Canal (if available)

# NOAA Tides and Currents stations
noaa_tide_stations:
  - id: "8761724"
    name: "Pilots Station East SW Pass"
  - id: "8761927"
    name: "New Canal Station"
  - id: "8760922"
    name: "Michoud Canal, ICWW"
  - id: "8762075"
    name: "Port Sulphur"

# USACE levee system identifiers (National Levee Database)
usace_levee_systems:
  - "Lake Pontchartrain and Vicinity Hurricane Protection System"
  - "Orleans Parish East of Harvey Canal"
  - "New Orleans to Venice"

# NWS Lower Mississippi River Forecast Center
nws_lmrfc_url: "https://www.weather.gov/lmrfc"

# Pump-station ground truth
# Populated from hand-coded evidence/no_pump_stations_ida2021.csv
pump_station_evidence: "evidence/no_pump_stations_ida2021.csv"

regime:
  type: "compound_surge_pluvial"
  spatial_autocorrelation_range_km: 25  # levee-protected basin scale
  dominant_mechanism: "tropical_cyclone_surge_plus_rainfall_plus_pump_failure"
  infrastructure_stressor: "levee_system_and_pump_station_capacity"
  hypothesized_active_gate: "S"  # stability under compound surge + rain

# Minimum viable dataset criteria
mvd:
  min_zctas: 30
  required_columns:
    - zcta_id
    - event
    - nfip_event_claim_count
    - acs_total_pop
    - svi_overall
    - levee_condition_rating
