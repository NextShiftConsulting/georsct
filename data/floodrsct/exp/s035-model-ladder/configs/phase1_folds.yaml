# Phase 1: Fold Generation
# Create 3 deterministic fold assignment columns

scenarios:
  - houston

seed: 42
n_folds_blocked: 5     # county-blocked CV folds

splits:
  random:
    test_fraction: 0.2
    stratify_by: null   # pure random for A.1 leakage diagnostic
  county_blocked:
    n_folds: 5
    method: greedy_bin_packing  # balance fold sizes by ZCTA count
  leave_event_out:
    method: hold_one_event      # each event is one fold

# Output: s3://swarm-floodrsct-data/folds/{scenario}_folds.parquet
