# Phase 2: R0 Tabular Baseline
# HistGBDT + Ridge on ZCTA tabular features
#
# NOTE: This config is a DESIGN DOCUMENT, not runtime config.
# Training scripts (train_r0_baseline.py) use hardcoded target definitions.
# Keep in sync with train_r0_baseline.py TARGETS list.

scenarios:
  - houston
  - southwest_florida
  - nyc
  - riverside_coachella
  - new_orleans

representation: R0

targets:
  nfip_loss:
    column: obs_nfip_event_claims
    transform: log1p
    task: regression
    metric: r2
  report_311:
    column: obs_has_311
    transform: null
    task: classification
    metric: roc_auc
  hwm_presence:
    column: obs_has_hwm
    transform: null
    task: classification
    metric: roc_auc

solvers:
  histgbdt:
    class: sklearn.ensemble.HistGradientBoostingRegressor
    params:
      max_iter: 200
      max_depth: 6
      learning_rate: 0.1
      random_state: 42
    # For classification target, use HistGradientBoostingClassifier
  ridge:
    class: sklearn.linear_model.Ridge
    params:
      alpha: 1.0
    pipeline:
      - sklearn.preprocessing.StandardScaler
      - sklearn.impute.SimpleImputer

splits:
  - random
  - spatial_blocked

# Features: R0_FEATURES from train_r0_baseline.py
# NaN handling: HistGBDT native; Ridge via SimpleImputer(strategy=median)

# Output: s3://swarm-floodrsct-data/results/s035/r0_{scenario}.json
#         s3://swarm-floodrsct-data/results/s035/r0_{scenario}_predictions.parquet
