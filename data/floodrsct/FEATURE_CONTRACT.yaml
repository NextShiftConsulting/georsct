  # ─── NWIS Gauge Observations ─────────────────────────────────────────────
  # WARNING: peak_stage and peak_flow are event-time observations.
  # Correlated with flood damage. Using as predictors in a pre-event forecast
  # model is label leakage. Safe only for nowcast (event-in-progress) models.

  - feature_name: peak_stage_ft
    temporal_class: event_window
    scenarios: [houston, new_orleans, nyc, riverside_coachella, southwest_florida]
    source_type: derived
    source_dataset: usgs_nwis
    build_function: aggregate_nwis
    output_column: peak_stage_ft
    missing_behavior: "NaN"
    version_target: v24.002
    notes: >
      Maximum USGS gauge stage (ft) during event window.
      NOT a pre-event predictor. Do NOT use in R0/R1 feature sets.

  - feature_name: peak_flow_cfs
    temporal_class: event_window
    scenarios: [houston, new_orleans, nyc, riverside_coachella, southwest_florida]
    source_type: derived
    source_dataset: usgs_nwis
    build_function: aggregate_nwis
    output_column: peak_flow_cfs
    missing_behavior: "NaN"
    version_target: v24.002
    notes: >
      Maximum USGS gauge streamflow (cfs) during event window.
      NOT a pre-event predictor. Do NOT use in R0/R1 feature sets.
