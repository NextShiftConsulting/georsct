# FEATURE_CONTRACT.yaml — Series 035 FloodRSCT
# Single source of truth for all infrastructure evidence and derived features.
# Every column in the (unit, event) tables must trace to an entry here.
#
# field_status behaviors:
#   present              — value computed successfully
#   missing_source_data  — public raw data not yet fetched / not available for version
#   operational_status_unavailable — real-time operational telemetry; no public archive
#
# source_type:
#   public_fetch   — raw data fetched from public source to S3
#   derived        — computed in build_event_dataset.py from one or more raw inputs
#   hand_coded     — manually assembled evidence CSV in evidence/
#   operational    — real-time status; cannot be obtained from public historical archive
#
# version_target: the s035 data version when this field becomes fully populated
#
# temporal_class:
#   invariant     — physical geography; unchanged across events (DEM, coastal distance, catchment area)
#   slow_drift    — updated annually/decadally; version-pinned per analysis (NLCD, census, SVI, flood zones)
#   event_window  — measured hourly during the event; aggregated to (unit, event) row (MRMS, HRRR, tides, track)
#   post_event    — observed days/weeks after event; ground truth / outcome (HWMs, 311, NFIP claims)
#   operational   — real-time telemetry; cannot be historically reconstructed (pump status, road closures)
#
# CAUSAL BOUNDARY: Only invariant, slow_drift, and event_window features are legitimate
# inputs to a forecast model or certificate. post_event features are LABELS/OUTCOMES —
# using them as inputs is label leakage. operational features are unknowable at forecast time.
# ---

features:

  # ═══════════════════════════════════════════════════════════════════════════
  # GeoCertDB2026 Static Features — ZCTA-level, invariant or slow_drift
  # Source: copy_geocertdb2026.py copies from geocert/v24 to s035 bucket.
  # These form the R0 tabular baseline backbone.
  # ═══════════════════════════════════════════════════════════════════════════

  # ─── ACS Demographics (Census Bureau, 2017-2021 5-year) ──────────────────

  - feature_name: acs_total_pop
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_total_pop
    notes: Total population. Base denominator for per-capita features.

  - feature_name: acs_median_hh_income
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_median_hh_income
    notes: Median household income ($).

  - feature_name: acs_pct_below_poverty
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_pct_below_poverty
    notes: Percent population below poverty line.

  - feature_name: acs_pct_renter_occupied
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_pct_renter_occupied
    notes: Percent renter-occupied housing units.

  - feature_name: acs_pct_owner_occupied
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_pct_owner_occupied
    notes: Percent owner-occupied housing units.

  - feature_name: acs_pct_vacant
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_pct_vacant
    notes: Percent vacant housing units.

  - feature_name: acs_pct_no_vehicle
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_pct_no_vehicle
    notes: Percent households with no vehicle. Evacuation vulnerability proxy.

  - feature_name: acs_median_home_value
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_median_home_value
    notes: Median home value ($). Correlated with NFIP penetration.

  - feature_name: acs_median_year_built
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_median_year_built
    notes: Median year structure built. Proxy for building code vintage.

  - feature_name: acs_median_age
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_median_age
    notes: Median age of population.

  - feature_name: acs_pct_over_65
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_pct_over_65
    notes: Percent population age 65+. Vulnerability indicator.

  - feature_name: acs_pct_under_18
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_pct_under_18
    notes: Percent population under 18.

  - feature_name: acs_pct_no_insurance
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_pct_no_insurance
    notes: Percent uninsured population.

  - feature_name: acs_unemployment_rate
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_unemployment_rate
    notes: Unemployment rate.

  - feature_name: acs_gini_index
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: acs_gini_index
    notes: Gini coefficient of income inequality.

  # Remaining ACS columns (acs_pct_hispanic, acs_pct_black, acs_pct_white,
  # acs_pct_asian, acs_pct_foreign_born, acs_pct_english_only,
  # acs_pct_no_hs, acs_pct_bachelors, acs_pct_graduate,
  # acs_pct_food_stamps, acs_pct_veterans, acs_pct_female,
  # acs_pct_drive_alone, acs_pct_transit, acs_pct_walk_bike,
  # acs_pct_wfh, acs_mean_commute_min, acs_median_rent)
  # follow same pattern: temporal_class=slow_drift, source=geocertdb2026.
  # Not individually listed to keep contract concise — all are present
  # in geocertdb2026 and passthrough-copied by copy_geocertdb2026.py.

  # ─── SVI (CDC Social Vulnerability Index, 2020) ──────────────────────────

  - feature_name: svi_overall
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: svi_overall
    notes: CDC SVI overall percentile (0-1). Composite vulnerability.

  - feature_name: svi_socioeconomic
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: svi_socioeconomic
    notes: SVI Theme 1 — socioeconomic status percentile.

  - feature_name: svi_household_disability
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: svi_household_disability
    notes: SVI Theme 2 — household composition & disability percentile.

  - feature_name: svi_minority_language
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: svi_minority_language
    notes: SVI Theme 3 — minority status & language percentile.

  - feature_name: svi_housing_transport
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: svi_housing_transport
    notes: SVI Theme 4 — housing type & transportation percentile.

  # ─── FEMA Flood Zones (NFHL, periodically updated) ──────────────────────

  - feature_name: flood_pct_zone_a
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: flood_pct_zone_a
    notes: Percent ZCTA area in SFHA Zone A (1% annual flood risk).

  - feature_name: flood_pct_zone_x
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: flood_pct_zone_x
    notes: Percent ZCTA area in Zone X (minimal flood hazard).

  - feature_name: flood_pct_zone_x500
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: flood_pct_zone_x500
    notes: Percent ZCTA area in Zone X-500 (0.2% annual flood risk).

  - feature_name: flood_sfha
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: flood_sfha
    notes: Whether any SFHA zone intersects the ZCTA (boolean/categorical).

  # ─── NOAA Storm Events (historical flood record) ────────────────────────

  - feature_name: flood_event_count
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: flood_event_count
    notes: Total historical flood events touching this ZCTA (NOAA Storm Events DB).

  - feature_name: flood_event_count_5y
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: flood_event_count_5y
    notes: Flood events in most recent 5-year window.

  - feature_name: flood_events_per_year
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: flood_events_per_year
    notes: Annualized flood event rate.

  - feature_name: flood_property_damage_k
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: flood_property_damage_k
    notes: Cumulative property damage ($K) from historical floods.

  - feature_name: flood_crop_damage_k
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: flood_crop_damage_k
    notes: Cumulative crop damage ($K) from historical floods.

  # ─── Terrain (derived in geocertdb2026 from NED/3DEP) ───────────────────

  - feature_name: slope_mean_pct
    temporal_class: invariant
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: slope_mean_pct
    notes: Mean slope (percent rise) within ZCTA.

  - feature_name: twi_twi
    temporal_class: invariant
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: twi_twi
    notes: Topographic Wetness Index — ln(contributing_area / tan(slope)).

  # ─── NFIP Historical Insurance (OpenFEMA, cumulative pre-event) ─────────

  - feature_name: nfip_claim_count
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: nfip_claim_count
    notes: >
      Cumulative historical NFIP claims in this ZCTA (all years pre-event).
      NOT the per-event claim count (that is obs_nfip_event_claims, a label).

  - feature_name: nfip_total_loss
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: nfip_total_loss
    notes: Cumulative historical NFIP total loss ($) in this ZCTA.

  - feature_name: nfip_mean_loss_per_claim
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: nfip_mean_loss_per_claim
    notes: Mean loss per claim ($). nfip_total_loss / nfip_claim_count.

  # ─── HIFLD Infrastructure ──────────────────────────────────────────────

  - feature_name: hifld_nearest_hospital_km
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: hifld_nearest_hospital_km
    notes: Distance (km) to nearest hospital from ZCTA centroid.

  - feature_name: hifld_n_hospitals
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: hifld_n_hospitals
    notes: Count of hospitals within ZCTA boundary.

  - feature_name: population
    temporal_class: slow_drift
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: population
    notes: >
      Total population (may differ slightly from acs_total_pop due to
      vintage or source differences in geocertdb2026).

  # ─── Geographic / Accessibility ────────────────────────────────────────

  - feature_name: latitude
    temporal_class: invariant
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: latitude
    notes: ZCTA centroid latitude.

  - feature_name: longitude
    temporal_class: invariant
    scenarios: all
    source_type: public_fetch
    source_dataset: geocertdb2026
    output_column: longitude
    notes: ZCTA centroid longitude.

  # ─── Observability Metadata ────────────────────────────────────────────
  # These describe measurement coverage, not flood outcomes.

  - feature_name: obs_gauge_count
    temporal_class: event_window
    scenarios: all
    source_type: derived
    source_dataset: usgs_nwis
    output_column: obs_gauge_count
    notes: Number of USGS stream gauges within or near ZCTA during event.

  - feature_name: obs_mrms_coverage_pct
    temporal_class: event_window
    scenarios: all
    source_type: derived
    source_dataset: noaa_mrms
    output_column: obs_mrms_coverage_pct
    notes: Fraction of event hours with valid MRMS data for this ZCTA.

  - feature_name: obs_missing_sensor_flag
    temporal_class: event_window
    scenarios: all
    source_type: derived
    source_dataset: multiple
    output_column: obs_missing_sensor_flag
    notes: True if key sensor data (gauge or MRMS) is missing for this ZCTA+event.

  # ═══════════════════════════════════════════════════════════════════════════
  # Scenario-Specific Derived Features
  # ═══════════════════════════════════════════════════════════════════════════

  # ─── NLCD Impervious Surface ──────────────────────────────────────────────

  - feature_name: impervious_pct
    temporal_class: slow_drift
    scenarios: [houston, nyc]
    source_type: derived
    source_dataset: nlcd_impervious
    raw_s3_path: raw/nlcd/impervious_2021/
    processed_s3_path: raw/nlcd/impervious_pct_zcta.parquet
    build_function: build_impervious_features
    output_column: impervious_pct
    missing_behavior: "NaN — field_status = missing_source_data"
    field_status_behavior: missing_source_data
    version_target: v24.003
    notes: >
      NLCD 2021 30m impervious surface GeoTIFF; state subsets for TX (48) and NY (36).
      Fetch: fetch_nlcd_impervious.py writes raw GeoTIFFs.
      Derive: build_impervious_features() does ZCTA zonal statistics in build_event_dataset.py.

  # ─── DEM Elevation ────────────────────────────────────────────────────────

  - feature_name: elevation_m_msl
    temporal_class: invariant
    scenarios: [southwest_florida, new_orleans]
    source_type: derived
    source_dataset: usgs_3dep_dem
    raw_s3_path: raw/dem/3dep/v1/
    processed_s3_path: raw/dem/elevation_m_msl_zcta.parquet
    build_function: build_elevation_features
    output_column: elevation_m_msl
    missing_behavior: "NaN — field_status = missing_source_data"
    field_status_behavior: missing_source_data
    version_target: v24.003
    notes: >
      USGS 3DEP 1/3 arc-second (~10m) DEM.
      Fetch: fetch_dem_elevation.py downloads raw GeoTIFFs for FL (12) and LA (22).
      Derive: build_elevation_features() computes mean elevation per ZCTA centroid.

  # ─── MTBS Burn Scars ──────────────────────────────────────────────────────

  - feature_name: burn_scar_overlap
    temporal_class: slow_drift
    scenarios: [riverside_coachella]
    source_type: derived
    source_dataset: mtbs_burn_perimeters
    raw_s3_path: raw/mtbs/perimeters/v2023/
    processed_s3_path: raw/mtbs/burn_scar_zcta.parquet
    build_function: build_burn_scar_features
    output_column: burn_scar_overlap
    missing_behavior: "False (conservative) — with field_status = missing_source_data if raw absent"
    field_status_behavior: missing_source_data
    version_target: v24.003
    notes: >
      USGS Monitoring Trends in Burn Severity (MTBS) 2015-2023 perimeter shapefile.
      Filter to Riverside (06065) + San Bernardino (06071) counties.
      Fetch: fetch_mtbs_burn_scars.py writes raw shapefile as GeoParquet.
      Derive: build_burn_scar_features() computes binary overlap per ZCTA.

  # ─── NHDPlus Catchments ───────────────────────────────────────────────────

  - feature_name: upstream_catchment_km2
    temporal_class: invariant
    scenarios: [riverside_coachella]
    source_type: derived
    source_dataset: nhdplus_v2_catchments
    raw_s3_path: raw/nhdplus/catchments/v2/
    processed_s3_path: raw/nhdplus/catchment_area_zcta.parquet
    build_function: build_catchment_features
    output_column: upstream_catchment_km2
    missing_behavior: "NaN — field_status = missing_source_data"
    field_status_behavior: missing_source_data
    version_target: v24.003
    notes: >
      NHDPlus V2 catchment polygons for HUC4 1810 (Lower Colorado) + 1811 (Salton Sea area).
      Fetch: fetch_nhdplus_catchments.py writes raw catchment GeoParquet.
      Derive: build_catchment_features() spatially joins to ZCTAs; sums contributing area.

  - feature_name: wash_segment_id
    temporal_class: invariant
    scenarios: [riverside_coachella]
    source_type: derived
    source_dataset: nhdplus_v2_catchments
    raw_s3_path: raw/nhdplus/catchments/v2/
    processed_s3_path: raw/nhdplus/catchment_area_zcta.parquet
    build_function: build_catchment_features
    output_column: wash_segment_id
    missing_behavior: "null string — field_status = missing_source_data"
    field_status_behavior: missing_source_data
    version_target: v24.003
    notes: >
      NHD COMID of the dominant wash/channel segment intersecting each ZCTA.
      Derived from same NHDPlus fetch as upstream_catchment_km2.

  # ─── SLOSH Surge ─────────────────────────────────────────────────────────

  - feature_name: slosh_max_surge_m
    temporal_class: invariant
    scenarios: [southwest_florida]
    source_type: derived
    source_dataset: noaa_slosh_mom
    raw_s3_path: raw/noaa_slosh/mom_national/
    processed_s3_path: (embedded in southwest_florida_event_features.parquet)
    build_function: build_slosh_features
    output_column: slosh_max_surge_m
    missing_behavior: "NaN — field_status = missing_source_data"
    field_status_behavior: missing_source_data
    version_target: v24.002
    notes: >
      NHC SLOSH MOM (Maximum of MEOWs) national inundation grid (v4).
      MOM is basin-specific and category-specific, NOT storm-specific.
      One download covers all SWFL basins (FTM/Ian, TBW/Milton, APF/Helene).
      Derive: build_slosh_features() samples MOM raster at ZCTA centroids
      using the storm's Saffir-Simpson category at landfall as lookup key.
      See METHODS.md "SLOSH MOM Surge Hazard" for full rationale.

  - feature_name: slosh_category
    temporal_class: invariant
    scenarios: [southwest_florida]
    source_type: derived
    source_dataset: noaa_slosh_mom
    raw_s3_path: raw/noaa_slosh/mom_national/
    processed_s3_path: (embedded in southwest_florida_event_features.parquet)
    build_function: build_slosh_features
    output_column: slosh_category
    missing_behavior: "null — field_status = missing_source_data"
    field_status_behavior: missing_source_data
    version_target: v24.002
    notes: >
      Saffir-Simpson category used for MOM lookup. Determined by storm's
      actual category at landfall (Ian=Cat4, Milton=Cat3, Helene=Cat4).
      Same build function and source as slosh_max_surge_m.

  - feature_name: coastal_distance_m
    temporal_class: invariant
    scenarios: [southwest_florida]
    source_type: derived
    source_dataset: tiger_coastline
    raw_s3_path: raw/tiger/coastline/v2020/
    processed_s3_path: raw/tiger/coastal_distance_zcta.parquet
    build_function: build_coastal_distance_features
    output_column: coastal_distance_m
    missing_behavior: "NaN — field_status = missing_source_data"
    field_status_behavior: missing_source_data
    version_target: v24.003
    notes: >
      Haversine distance from ZCTA centroid to nearest point on TIGER 2020 coastline.
      Fetch: fetch_tiger_coastline.py writes raw national coastline shapefile.
      Derive: build_coastal_distance_features() computes nearest-neighbor distances.

  # ─── NYC Sewersheds ───────────────────────────────────────────────────────

  - feature_name: sewer_shed_id
    temporal_class: invariant
    scenarios: [nyc]
    source_type: derived
    source_dataset: nyc_sewersheds
    raw_s3_path: raw/nyc_sewersheds/nyc_sewersheds.gpkg
    processed_s3_path: (embedded in nyc_event_features.parquet)
    build_function: build_sewershed_features
    output_column: sewer_shed_id
    missing_behavior: "null — field_status = missing_source_data"
    field_status_behavior: missing_source_data
    version_target: v24.002
    notes: >
      NYC DEP drainage area polygon for the dominant sewer shed intersecting each ZCTA.
      Raw sewersheds already fetched by fetch_nyc_sewersheds.py.
      Derive: build_sewershed_features() spatial join in build_event_dataset.py.

  # ─── MTA Subway Stations ─────────────────────────────────────────────────

  - feature_name: subway_station_count
    temporal_class: invariant
    scenarios: [nyc]
    source_type: derived
    source_dataset: mta_subway_stations
    raw_s3_path: raw/mta/subway_stations/v1/subway_stations.parquet
    processed_s3_path: (embedded in nyc_event_features.parquet)
    build_function: build_subway_features
    output_column: subway_station_count
    missing_behavior: "0 — field_status = missing_source_data if raw absent"
    field_status_behavior: missing_source_data
    version_target: v24.003
    notes: >
      Count of MTA subway stations within ZCTA boundary.
      Fetch: fetch_mta_stations.py downloads from NYC Open Data (kk4q-3rt2).
      Derive: build_subway_features() counts stations per ZCTA.

  - feature_name: nearest_subway_distance_m
    temporal_class: invariant
    scenarios: [nyc]
    source_type: derived
    source_dataset: mta_subway_stations
    raw_s3_path: raw/mta/subway_stations/v1/subway_stations.parquet
    processed_s3_path: (embedded in nyc_event_features.parquet)
    build_function: build_subway_features
    output_column: nearest_subway_distance_m
    missing_behavior: "NaN — field_status = missing_source_data"
    field_status_behavior: missing_source_data
    version_target: v24.003
    notes: Same fetch and build function as subway_station_count.

  # ─── USACE Levees → ZCTA ─────────────────────────────────────────────────

  - feature_name: levee_condition_rating
    temporal_class: slow_drift
    scenarios: [new_orleans, nyc]
    source_type: derived
    source_dataset: usace_levees
    raw_s3_path: raw/usace_levees/{scenario}_levees.parquet
    processed_s3_path: (embedded in {scenario}_event_features.parquet)
    build_function: build_levee_features
    output_column: levee_condition_rating
    missing_behavior: "NaN — field_status = missing_source_data"
    field_status_behavior: missing_source_data
    version_target: v24.002
    notes: >
      USACE levee inspection condition rating nearest to each ZCTA centroid.
      Raw levees already fetched by fetch_usace_levees.py.
      Derive: build_levee_features() spatial proximity join in build_event_dataset.py.

  # ─── Land Subsidence (New Orleans) ───────────────────────────────────────

  - feature_name: subsidence_rate_mm_yr
