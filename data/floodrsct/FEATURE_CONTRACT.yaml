  - feature_name: tidal_surge_max_m
    temporal_class: event_window
    scenarios: [houston, new_orleans, southwest_florida, nyc]
    source_type: derived
    source_dataset: noaa_tides
    raw_s3_path: raw/noaa_tides/{event}/
    processed_s3_path: (embedded in {scenario}_event_features.parquet)
    build_function: aggregate_tides
    output_column: tidal_surge_max_m
    missing_behavior: "NaN — field_status = missing_source_data"
    field_status_behavior: missing_source_data
    version_target: v24.003
    surge_method: >
      Two methods, first non-null wins per station:
        1. prediction-based: surge_m = observed_m - predicted_m
           (when CO-OPS predictions available for station+datum)
        2. anomaly-based: surge_m = observed_m - median(observed_m[0:24h])
           (fallback when predictions unavailable; first 24h of event window
           is pre-landfall by design, providing a stable baseline)
      Both methods can coexist within the same event across different stations.
      See METHODS.md for full derivation and limitations.
    notes: >
      Maximum tidal surge during event window per station, broadcast to all ZCTAs
      (max across stations). Currently uniform — no spatial interpolation.
      Gulf stations (NOLA) typically lack NAVD/STND predictions; anomaly method
      fills the gap. Atlantic/Gulf coast stations with predictions use method 1.

