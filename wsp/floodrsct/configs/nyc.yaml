# New York / New Jersey — FloodRSCT scenario config

scenario: nyc
state_fips: ["36", "34"]  # NY, NJ
borough_counties:
  manhattan: "36061"
  brooklyn: "36047"
  queens: "36081"
  bronx: "36005"
  staten_island: "36085"
county_fips_list:
  - "36005"   # Bronx
  - "36047"   # Kings (Brooklyn)
  - "36061"   # New York (Manhattan)
  - "36081"   # Queens
  - "36085"   # Richmond (Staten Island)
zcta_state_filter: "NY"

events:
  sandy2012:
    disaster_declaration: DR-4085-NY
    start_date: "2012-10-27"
    end_date: "2012-11-08"
    nhc_storm_id: AL182012
    peak_window: ["2012-10-29", "2012-10-30"]
    # Storm surge + rainfall; all 5 boroughs designated for Individual Assistance
  ida2021:
    disaster_declaration: DR-4615-NY
    start_date: "2021-09-01"
    end_date: "2021-09-03"
    nhc_storm_id: AL092021
    peak_window: ["2021-09-01", "2021-09-02"]
    # 311 data: ~10K flooding complaints in this 48-hour window
  henri2021:
    disaster_declaration: null  # Henri made landfall RI, limited NY declarations
    start_date: "2021-08-21"
    end_date: "2021-08-23"
    nhc_storm_id: AL082021
    peak_window: ["2021-08-21", "2021-08-22"]
  nyc_flood_2023:
    disaster_declaration: DR-4755-NY
    start_date: "2023-09-28"
    end_date: "2023-09-30"
    nhc_storm_id: null  # Extratropical system, not a named tropical cyclone
    peak_window: ["2023-09-29", "2023-09-30"]
    # Extreme rainfall; DR designates Kings (Brooklyn) for Public Assistance

# USGS NWIS — limited coastal-influenced gauges
usgs_anchor_sites:
  - "01372058"  # Hudson River at West Point
  - "01389500"  # Passaic River at Little Falls NJ
  - "01378500"  # Hackensack River at New Milford NJ
  - "01302000"  # Nissequogue River at Smithtown NY

# NYC 311 complaint types (Socrata filter)
nyc_311_complaint_types:
  - "Sewer"
  - "Street Flooding"
  - "Catch Basin Clogged/Flooding"
  - "Flooded Basement"

# NYC DEP sewer-sheds
# Source: NYC Open Data dataset nbry-ynxa or manual DEP portal download
nyc_dep_sewershed_dataset: "nbry-ynxa"
nyc_open_data_domain: "data.cityofnewyork.us"

# MTA subway flooding ground truth
# Populated from hand-coded evidence/nyc_subway_flooding_ida2021.csv
subway_evidence: "evidence/nyc_subway_flooding_ida2021.csv"

# USACE levee systems
usace_levee_systems:
  - "Jamaica Bay"
  - "Newtown Creek"
  - "Coney Island Creek"

regime:
  type: "urban_pluvial_compound"
  spatial_autocorrelation_range_km: 10  # sewershed/subway catchment scale
  dominant_mechanism: "extreme_rainfall_combined_sewer_overflow"
  infrastructure_stressor: "combined_sewer_and_subway_drainage"
  hypothesized_active_gate: "R"  # relevance of rainfall + sewershed capacity

# Minimum viable dataset criteria
mvd:
  min_zctas: 100
  required_columns:
    - zcta_id
    - event
    - rainfall_total_mm
    - flood_311_count
    - nfip_event_claim_count
    - acs_total_pop
    - svi_overall
