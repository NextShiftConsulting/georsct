# ===========================================================================
# FloodRSCT Experiment Registry
# ===========================================================================
#
# PURPOSE: Single index of all experiment series.  Agents read this file
# to discover experiments without searching the filesystem.
#
# CONVENTION: One entry per experiment series.  Fields:
#   series_id     - Unique identifier (e.g., s035)
#   title         - Human-readable name
#   target        - Submission venue and deadline
#   directory     - Absolute path to experiment root
#   status_file   - Path to EXPERIMENT_STATUS.yaml
#   contract_file - Path to EXPERIMENT_CONTRACT.yaml
#   phase_status  - High-level completion summary
#   hypotheses    - Count and primary hypothesis
#   scenarios     - List of geographic scenarios
#   s3_bucket     - S3 bucket for artifacts
#   s3_prefix     - S3 key prefix for results
# ===========================================================================

