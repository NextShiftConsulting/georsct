# ===========================================================================
# Adding a new experiment:
# 1. Copy the template above
# 2. Fill in series_id, active: true, title, directory
# 3. Create the experiment directory with standard layout (see SKILL.md)
# 4. Scaffold EXPERIMENT_CONTRACT.yaml and EXPERIMENT_STATUS.yaml
# 5. Use swarm-experiment skill for initial scaffolding
#
# Lifecycle:
#   active: true  -> bootstrap reports it, lifecycle tracks it
#   active: false -> bootstrap skips it (parked/completed)
#   Set active: false when all phases COMPLETED and no further work planned
# ===========================================================================
