  - phase_id: variance_stack
    script: run_variance_stack.py
    description: "Phase 4e.2: 5-step variance stack decomposition (raking, shrinkage, blocking, bootstrap, ensemble)"
    per_scenario: false
    depends_on: [deployment_alignment]

    packages:
      - numpy
      - pandas
      - pyarrow
      - scipy
      - scikit-learn

    features: null

    # Pre-flight gate thresholds for cell runnability (cell_outcome.py).
    # Derived, not magic: fold_floor = 2 * min_samples_leaf.
    gate:
      max_bins: 32                        # fixed for ALL cells; never min(255, n_train)
      min_samples_leaf: 20                # HGB default; fold_floor derived as 2x this
      min_prevalence: 0.03                # classification prevalence floor
      # fold_floor = 40 (derived, not stored separately)

    outputs:
      - key: "results/s035/sidecar/variance_stack/variance_stack_results.json"

