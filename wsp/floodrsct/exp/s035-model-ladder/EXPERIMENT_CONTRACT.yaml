    packages:
      - scikit-learn
      - scipy
      - numpy
      - pandas
      - pyarrow

    s3_artifacts:
      - key: assembled_parquet
        description: "Event features"
        per_scenario: true
      - key: "folds/{scenario}_folds.parquet"
        description: "Fold assignments"
        per_scenario: true

    outputs:
      - key: "results/s035/cross_analysis/a4_feature_importance_stability.json"
        description: "Pairwise Kendall tau, importance heatmap"

  - phase_id: cross_analysis_a6
    script: cross_analysis_a6_coverage.py
    launcher: launch_cross_analysis_a6.py
    description: "A6: Coverage gap geographic overlap"
    per_scenario: false
    depends_on: [prithvi_embeddings, hydrology_fetch]

    packages:
      - scipy
      - numpy
      - pandas
      - pyarrow

    s3_artifacts:
      - key: "results/s035/prithvi_embeddings/{scenario}_prithvi_embeddings.parquet"
        description: "Prithvi embeddings (HLS/fallback source column)"
        per_scenario: true
      - key: assembled_parquet
        description: "Event features (lat/lon for geographic characterization)"
        per_scenario: true

    outputs:
      - key: "results/s035/cross_analysis/a6_coverage_gap_overlap.json"
        description: "Fisher exact test, Jaccard index per scenario"

  - phase_id: cross_analysis_a7
    script: cross_analysis_a7_nfip_ablation.py
    launcher: launch_cross_analysis_a7.py
    description: "A7: NFIP feature ablation — circularity disambiguation"
    per_scenario: false
    depends_on: [r0_baseline, cross_analysis_a3, cross_analysis_a4]

    packages:
      - scikit-learn
      - scipy
      - numpy
      - pandas
      - pyarrow

    s3_artifacts:
      - key: assembled_parquet
        description: "Event features for all 5 scenarios"
        per_scenario: true
      - key: "folds/{scenario}_folds.parquet"
        description: "Frozen spatial-blocked fold assignments"
        per_scenario: true

    outputs:
      - key: "results/s035/cross_analysis/a7_nfip_ablation.json"
        description: "Full vs ablated: within-R2, importance tau, transfer matrix"

# ── Verification Gates ────────────────────────────────────────────────
# Machine-readable gate definitions.  Full prose and commands in VERIFY.md.
# Each gate lists checks with pass_criteria.  Automated verification
# scripts can read this section; VERIFY.md is the human-readable companion.
#
# Gate lifecycle:
#   V0   Pre-launch    -- resource review (9 dimensions)
#   V0.5 In-flight     -- AWS monitoring, kill criteria
#   V0.7 Checkpoint    -- S3 file integrity during/after run
#   V1   Post-flight   -- job exit status, output files present
#   V2   Domain        -- silent pipeline bugs (simplex, kappa, gearbox, vocabulary)
#   V3   Cross-fold    -- fold variance stability
#   V4   Protocol      -- experiment-specific invariants
#   V5   Paper-ready   -- final gate before citing in manuscript

verification_gates:

  - gate_id: V0
    name: Pre-Launch Resource Review
    phase: pre-launch
    applies_to: all_phases
    checks:
      - id: V0.1
        dimension: git_state
        pass_criteria: "git status clean, git push done, commit hash recorded"
      - id: V0.2
        dimension: memory_budget
        pass_criteria: "largest_parquet x folds <= 0.5 x instance_RAM"
        default: "ml.m5.large (8 GB) sufficient for all s035 phases"
      - id: V0.3
        dimension: volume_sizing
        pass_criteria: "pip_install + temp_files + safety margin"
        default: "10 GB"
      - id: V0.4
        dimension: worker_count
        pass_criteria: "n_jobs matches instance vCPUs"
      - id: V0.5
        dimension: image_and_drivers
        pass_criteria: "base image + pip packages match contract phase.packages"
      - id: V0.6
        dimension: instance_quota
        pass_criteria: "aws service-quotas shows availability"
      - id: V0.7
        dimension: dry_run
        pass_criteria: "--dry-run shows correct config"
      - id: V0.8
        dimension: checkpoint_idempotency
        pass_criteria: "job skips completed scenarios on resume"
      - id: V0.9
        dimension: timeout
        pass_criteria: "MaxRuntimeInSeconds > 2x expected wall clock"
        default: "3600s (jobs run ~5 min)"
    contract_coverage: "validate_experiment_readiness.py covers V0.5 (packages) and V0.8 (inputs)"

  - gate_id: V0.5
    name: AWS Monitoring
    phase: in-flight
    applies_to: all_phases
    checks:
      - id: V0.5.1
        check: job_accepted
        pass_criteria: "ProcessingJobStatus not Failed within 5 min"
      - id: V0.5.2
        check: bootstrap_succeeded
        pass_criteria: "no ModuleNotFoundError in first 50 log lines"
      - id: V0.5.3
        check: data_loaded
        pass_criteria: "'Loaded N ZCTAs' log line present"
      - id: V0.5.4
        check: no_encoding_crash
        pass_criteria: "no UnicodeEncodeError in log"
    kill_criteria:
      - "ModuleNotFoundError or ImportError in first 5 min"
      - "UnicodeEncodeError"
      - "KeyError: 'zcta_id'"
      - "Job past 2x expected runtime with no new S3 output"
      - "exit code 137 (OOM)"

  - gate_id: V0.7
    name: Checkpoint Data Integrity
    phase: during_and_after
    applies_to: all_phases
    checks:
      - id: V0.7.1
        check: files_appearing
        pass_criteria: "new .json files on S3 over time"
      - id: V0.7.2
        check: files_not_empty
        pass_criteria: "each file > 100 bytes"
      - id: V0.7.3
        check: files_parseable
        pass_criteria: "python -m json.tool succeeds"
      - id: V0.7.4
        check: no_duplicate_folds
        pass_criteria: "unique (zcta_id, event) in fold files"

  - gate_id: V1
    name: Job Completion
    phase: post-flight
    applies_to: all_phases
    checks:
      - id: V1.1
        check: exit_code
        pass_criteria: "ProcessingJobStatus: Completed"
      - id: V1.2
        check: no_truncation
        pass_criteria: "final summary line in CloudWatch, no OOM/SIGKILL"
      - id: V1.3
        check: all_scenarios
        pass_criteria: "5 per-scenario result files per level"
      - id: V1.4
        check: result_file_exists
        pass_criteria: "result JSON with timestamp field on S3"

  - gate_id: V2
    name: Domain Invariants
    phase: post-flight
    applies_to: [certificates_r0, certificates_r1, certificates_r2, gearbox_warmup, dgm_routing, r3_block_tests, r3_block_admission]
    checks:
      - id: V2.1
        check: simplex_validity
        pass_criteria: "abs(R + S_sup + N - 1.0) < 1e-6 for all cells"
      - id: V2.2
        check: simplex_discrimination
        pass_criteria: "std(mean_R per level) > 0.02 for >= 3/5 scenarios"
      - id: V2.3
        check: kappa_geom_independence
        pass_criteria: "kappa_geom present, >= 6/11 non-NaN, level-invariant, pre-training timestamp"
      - id: V2.4
        check: gearbox_signals
        pass_criteria: "tau/sigma/alpha/collapse_risk/coherence all in valid ranges, >= 2 distinct gears"
        applies_to: [gearbox_warmup]
      - id: V2.5
        check: decision_vocabulary
        pass_criteria: "InternalDecision (not MorphType) in routing; PublicDecision in output"
        applies_to: [dgm_routing]

  - gate_id: V3
    name: Cross-Fold Stability
    phase: post-flight
    applies_to: [r0_baseline, r1_hydrology, r2_temporal, r3_certified_training]
    checks:
      - id: V3.1
        check: fold_spread
        pass_criteria: "max - min fold R2 < 0.30 for >= 80% of cells"
      - id: V3.2
        check: split_agreement
        pass_criteria: "Spearman rho > 0.6 between spatial and random splits"
      - id: V3.3
        check: best_arm_stable
        pass_criteria: "same best arm in >= 4/5 folds for majority of cells"
      - id: V3.4
        check: sigma_tracks_variance
        pass_criteria: "positive correlation between sigma and fold_r2_std"

  - gate_id: V4
    name: Protocol-Specific
    phase: post-flight
    checks:
      - id: V4.1
        check: representation_ladder
        pass_criteria: "R1 superset of R0 features; R2 superset of R1; no target leakage; fold reuse"
        applies_to: [r0_baseline, r1_hydrology, r2_temporal]
      - id: V4.2
        check: money_table
        pass_criteria: ">= 9 cells, H2a Wilcoxon present, negative results included, bootstrap CIs"
        applies_to: [uplift_table]
      - id: V4.3
        check: dgm_routing
        pass_criteria: "both strategies evaluated, Clopper-Pearson CI, proof-of-concept framing"
        applies_to: [dgm_routing]
      - id: V4.4
        check: gearbox_calibration
        pass_criteria: "MIN_CALIBRATION_SAMPLES >= 8, winsorization, monotonicity, data-grounded sigma_c"
        applies_to: [gearbox_warmup]
      - id: V4.5
        check: spatially_blocked_paired_loss
        pass_criteria: "spatially_blocked_loss block present in money_table.json; county-level aggregation; exact permutation p-value; block bootstrap CI; n_blocks >= 20"
        applies_to: [uplift_table, r3_money_table]
        reference: "Statistical-Considerations.md §14"
      - id: V4.6
        check: independence_unit_separation
        pass_criteria: "spatial blocks defined by county crosswalk, NOT by DGM decisions; DGM used only as treatment assignment for H5/H8"
        applies_to: [r3_money_table]
        reference: "Statistical-Considerations.md §14 (four-layer separation)"
      - id: V4.7
        check: r3_block_admission
        pass_criteria: "all 6 blocks evaluated; (EnforcementDecision, GearState) pair per block; admission trace present; GEOSPATIAL_CONUS27 preset used"
        applies_to: [r3_block_admission]
      - id: V4.8
        check: r3_money_table
        pass_criteria: "H5-H8 test results present; 3 R3_2 variants (headline/full/stabilized); negative results included; fold-level Wilcoxon + spatially-blocked paired loss both reported"
        applies_to: [r3_money_table]
      - id: V4.9
        check: vlm_quarantine
        pass_criteria: "R4 excluded from paired Wilcoxon and spatially-blocked paired loss; R4 reported as descriptive reference column only (zero_shot=true, event_invariant=true, excluded_from_wilcoxon=true); no R0->R4 or R4->Rk uplift cells in money table"
        applies_to: [r4_vlm_comparison]
        reference: "Statistical-Considerations.md §3 (R4 broadcast quarantine)"
      - id: V4.10
        check: two_stage_event_aggregation
        pass_criteria: "spatially_blocked_paired_loss uses two-stage aggregation: (zcta_id, event) -> zcta mean -> county mean; NOT single-stage (zcta_id, event) -> county mean; verified by asserting n_block_obs <= n_unique_zctas (not n_rows)"
        applies_to: [uplift_table, r3_money_table]
        reference: "Statistical-Considerations.md §14.5 (event-level dependence)"
      - id: V4.11
        check: event_cascade_regeneration
        pass_criteria: "if events added to a scenario post-DOE: r2_supplement.parquet regenerated, nfip_historical.parquet regenerated, fold balance re-verified (<10% imbalance), all downstream certificates + models retrained; change control entry in DOE_AMENDMENT"
        applies_to: [r2_temporal, diagnostics_r2, r3_block_admission, r3_certified_training, r3_money_table]
        reference: "Statistical-Considerations.md §14.5 (cascade effect table)"

  - gate_id: V5
    name: Paper-Readiness
    phase: final
    applies_to: all_phases
    prerequisite: "all V1-V4 gates passed -- no exceptions, no waivers"
    checks:
      - id: V5.1
        check: git_hash_recorded
        pass_criteria: "commit hash in CHECKLIST.md matches pushed commit"
      - id: V5.2
        check: all_scenarios_complete
        pass_criteria: "R0 + R1 + R2 results for all 5 metros"
      - id: V5.3
        check: certificates_all_levels
        pass_criteria: "certificates_r0/r1/r2.json on S3"
      - id: V5.4
        check: money_table_final
        pass_criteria: "money_table.json reflects latest run"
      - id: V5.5
        check: dgm_dual_strategy
        pass_criteria: "both kappa-first and gear-informed evaluated"
      - id: V5.6
        check: no_kappa_gate
        pass_criteria: "grep -r kappa_gate results/ returns empty"
      - id: V5.7
        check: no_bare_S
        pass_criteria: "always S_sup in certificate fields"
      - id: V5.8
        check: wall_clock_documented
        pass_criteria: "duration in CHECKLIST.md execution record"
      - id: V5.9
        check: instance_type_documented
        pass_criteria: "instance in CHECKLIST.md execution record"
      - id: V5.10
        check: public_decision_wired
        pass_criteria: "routing output includes public_decision field (InternalDecision -> PublicDecision)"
      - id: V5.11
        check: spatially_blocked_loss_reported
        pass_criteria: "spatially_blocked_loss in money_table.json AND r3_money_table.json; county-level block n documented"
      - id: V5.12
        check: four_layer_separation
        pass_criteria: "no DGM terminology in spatial blocking; DGM used only as treatment assignment in H5/H8 reporting"
      - id: V5.13
        check: r3_admission_trace
        pass_criteria: "r3_dgm_admission_trace.json on S3; all blocks have (Decision, Gear) pair"
        applies_to_phase: r3_block_admission
      - id: V5.14
        check: r3_three_variants
        pass_criteria: "r3_money_table.json contains headline, full, and stabilized variant results"
        applies_to_phase: r3_money_table
      - id: V5.15
        check: two_stage_aggregation_documented
        pass_criteria: "paper methodology section states two-stage aggregation: per-ZCTA mean across events, then per-county mean; not single-stage"
      - id: V5.16
        check: event_count_reported
        pass_criteria: "paper reports events per scenario (Houston 3, NOLA 4, etc.) and states that events within a scenario share spatial substrate and are not independent spatial evidence"
