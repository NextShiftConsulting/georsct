# EXPERIMENT_CONTRACT.yaml -- Machine-readable pre-flight contract for s035.
#
# Each phase declares four validation layers:
#   packages:      pip packages that must be importable
#   features:      columns that must exist in the input parquet
#   s3_artifacts:  S3 keys that must exist before launch (inputs)
#   outputs:       S3 keys this phase produces (downstream dependencies)
#
# validate_experiment_readiness.py reads this file and gates --dry-run.

experiment: s035-model-ladder
bucket: swarm-floodrsct-data
version: "1.2"

# ── Observation Unit ──────────────────────────────────────────────────
# Grain: (zcta_id, event) — one row per ZCTA per flood event.
# "unit" throughout this experiment always means ZCTA (Census TIGER/Line 2022).
# Houston has 3 events, NYC has 4, etc. The same ZCTA appears N times
# for N events within a scenario. All features and targets are at this
# grain. Temporally-gated features (e.g. nfip_historical) use the
# event's start date as the cutoff, so the same ZCTA gets different
# feature values per event.
observation_unit:
  grain: [zcta_id, event]
  description: "One row per ZCTA per flood event within a scenario"
  primary_key: [zcta_id, event]
  unit_definition: "ZCTA = ZIP Code Tabulation Area (Census TIGER/Line 2022)"

# Modelable scenarios (5 metros, n=172-606 ZCTAs)
# New Orleans expanded from Orleans Parish (n=20) to 5-parish metro
# (Orleans, Jefferson, St. Bernard, Plaquemines, St. Tammany; n=66)
# with 4 events (Katrina 2005, Isaac 2012, Barry 2019, Ida 2021)
# giving 264 rows — borderline modelable, strong pre/post-levee signal.
modelable_scenarios: &modelable
  - houston
  - southwest_florida
  - nyc
  - riverside_coachella
  - new_orleans

# ── Canonical Targets ──────────────────────────────────────────────────
# Single source of truth for target column names and task types.
# DOE_LOCKED.md, DOE_R0_baseline.md, and all per-arm DOEs must match.
targets:
  - column: obs_nfip_event_claims
    task: regression
    transform: log1p
    metric: r2
    role: primary
    scenarios: [houston, southwest_florida, nyc, riverside_coachella, new_orleans]
    note: "Riverside sparse (50% NaN, max=20). All others fully populated."

  - column: obs_has_311
    task: binary_classification
    transform: none
    metric: roc_auc
    role: secondary
    scenarios: [houston, nyc, new_orleans]
    note: >
      Derived from flood_311_count > 0. Houston (ArcGIS) and NYC (Socrata)
      fetched at scaffold time. New Orleans (Socrata data.nola.gov) added
      2026-06-30 via fetch_nola_311.py; covers isaac2012 (42 records),
      barry2019 (676), ida2021 (107). katrina2005 predates the 311 portal.
      Riverside and SW Florida lack public 311 open data APIs.

  - column: obs_has_hwm
    task: binary_classification
    transform: none
    metric: roc_auc
    role: validation
    scenarios: [nyc, southwest_florida]
    note: >
      Derived from hwm_count > 0 via USGS STN sensor network.
      NYC: 99 True / 745 False (11.7% positive rate, usable).
      SW Florida: 29 True / 616 False (4.5% positive rate, usable).
      Houston: 0 True / 648 False (no HWM marks within 5 km of any ZCTA centroid).
      Riverside: 1 True / 171 False (degenerate).
      New Orleans: 1 True / 263 False (degenerate).
      Degenerate scenarios excluded — R0 training skips targets with nunique < 2.

# ── Canonical Feature Counts ──────────────────────────────────────────
# Approximate counts by level.  Exact counts vary by scenario (1-3
# scenario-specific features) and are validated at runtime by checking
# the assembled parquet column count.
#
# DOE_R0_baseline.md uses ~33 (approximate category sums).
# DOE_AMENDMENT_v1.2.md Change 13 uses R0=36 as the base.
# The discrepancy is ~3 features in approximate ACS/HIFLD subcounts.
# Runtime validation is authoritative; document counts are approximate.
feature_counts:
  R0:
    description: "Static tabular (ACS, SVI, FEMA zones, TWI, HIFLD, gated NFIP)"
    approximate: 33-36
    authoritative_doc: DOE_R0_baseline.md
    note: "Exact count depends on scenario; ~10 ACS + 4 SVI + ~6 flood + 4 terrain + ~6 HIFLD + 2 NFIP + ~1 land cover"
  R1:
    description: "R0 + hydrology universal (16) + scenario-specific (1-3) + W-matrix (8)"
    approximate: 58-63
    authoritative_doc: DOE_R1_spatial.md
    note: "Range reflects R0 uncertainty (33-36) plus scenario-specific features"
  R1.5:
    description: "R1 + FAST engineering model outputs (6)"
    approximate: 64-69
    authoritative_doc: DOE_AMENDMENT_v1.2.md (Change 11)
    note: "Conditional on NSI + depth raster availability"
  R2:
    description: "R1 + temporal event dynamics (9)"
    approximate: 67-72
    authoritative_doc: DOE_R2_temporal.md
    note: "R1 base + 9 temporal; range inherits R1 uncertainty"

phases:

  # ── Prithvi-EO-2.0 Embedding Extraction ─────────────────────────────
  # Per-ZCTA satellite imagery embeddings from Prithvi foundation model.
  # Mean-pooled patch tokens (not CLS) for spatial discrimination.
  # Fallback ZCTAs (no HLS coverage) get NaN embeddings.
  - phase_id: prithvi_embeddings
    script: extract_prithvi_embeddings.py
    launcher: launch_extract_prithvi_embeddings.py
    description: "Extract Prithvi-EO-2.0 embeddings from HLS satellite imagery per ZCTA"
    per_scenario: true
    depends_on: [event_building]

    packages:
      - torch
      - rasterio
      - pyproj
      - numpy
      - pandas
      - pyarrow
      - requests

    features:
      required:
        - zcta_id
        - latitude
        - longitude

    s3_artifacts:
      - key: "model/prithvi_eo2/weights/Prithvi_EO_V2_300M_TL.pt"
        description: "Prithvi-EO-2.0 300M checkpoint"
      - key: "model/prithvi_eo2/weights/config.json"
        description: "Prithvi model config"
      - key: "model/prithvi_eo2/weights/prithvi_mae.py"
        description: "Prithvi model definition"

    outputs:
      - key: "results/s035/prithvi_embeddings/{scenario}_prithvi_embeddings.parquet"
        description: "1024-dim mean-pooled patch embeddings per ZCTA"
        columns: [zcta, prithvi_emb_0..prithvi_emb_1023, source]
      - key: "results/s035/prithvi_embeddings/{scenario}_prithvi_meta.json"
        description: "Extraction metadata with coverage and quality stats"

    quality_gates:
      min_hls_coverage_pct: 60
      embed_dim: 1024
      pooling: mean_patch
      fallback_value: NaN
      max_fallback_pct: 40

  # ── Phase 0.5: Geometry Kappa (pre-training) ──────────────────────────
  # Computes kappa from problem geometry ONLY.  Zero dependency on RSN,
  # fold metrics, predictions, residuals, or model scores.
  - phase_id: geometry_kappa
    script: compute_geometry_kappa.py
    description: "Phase 0.5: geometry-only kappa (runs before any model training)"
    per_scenario: false

    packages:
      - numpy
      - pandas
      - pyarrow

    s3_artifacts:
      - key: assembled_parquet
        description: "Assembled event features parquet"
        per_scenario: true
        scenarios: *modelable
      - key: "raw/geocertdb2026/zcta_adjacency.parquet"
        description: "ZCTA adjacency edge list"
        optional: true
      - key: "raw/geocertdb2026/zcta_county_crosswalk.parquet"
        description: "ZCTA-county crosswalk"
        optional: true

    outputs:
      - key: "results/s035/geometry_kappa.json"
        description: "Geometry-only kappa per (scenario, target) cell"

  # ── Phase 0.75: Gearbox Warmup ────────────────────────────────────────
  # Runs a cheap Ridge solver with spatial-blocked CV to produce
  # data-grounded quality signals (tau, sigma, alpha_warmup, gear) that
  # vary per cell.  Enables gear-informed DGM routing (Phase 6) and
  # oobleck autocalibration.  Generates its own folds internally.
  - phase_id: gearbox_warmup
    script: compute_gearbox_warmup.py
    description: "Phase 0.75: gearbox warmup (cheap Ridge CV for per-cell gear assignment)"
    per_scenario: false

    packages:
      - scikit-learn
      - numpy
      - pandas
      - pyarrow

    s3_artifacts:
      - key: assembled_parquet
        description: "Assembled event features parquet"
        per_scenario: true
        scenarios: *modelable
      - key: "raw/geocertdb2026/zcta_county_crosswalk.parquet"
        description: "ZCTA-county crosswalk for spatial blocking"
        optional: true
      - key: "processed/{scenario}/{scenario}_nfip_historical.parquet"
        description: "Temporally-gated NFIP historical features"
        per_scenario: true
        scenarios: *modelable
        optional: true

    outputs:
      - key: "results/s035/gearbox_warmup.json"
        description: "Per-cell gear assignment + quality signals (tau, sigma, alpha_warmup, collapse_risk, coherence)"

  # ── Phase 1: R0 Baseline ──────────────────────────────────────────────
  - phase_id: r0_baseline
    script: train_r0_baseline.py
    description: "Phase 1: R0 tabular baseline (folds + HistGBDT + Ridge)"
    per_scenario: true

    packages:
      - scikit-learn
      - numpy
      - pandas
      - pyarrow
      - scipy

    features:
      source: assembled_parquet  # resolved via OUTPUT_KEYS[scenario]
      required:
        - zcta_id
        - event
        - flood_pct_zone_a
        - flood_sfha
        - acs_total_pop
        - acs_median_hh_income
        - svi_overall
      targets:
        - obs_nfip_event_claims
        - obs_has_311
        - obs_has_hwm

    s3_artifacts:
      - key: assembled_parquet
        description: "Assembled event features parquet"
      - key: "processed/{scenario}/{scenario}_nfip_historical.parquet"
        description: "Temporally-gated NFIP historical features (frequency + severity per zcta_id x event)"
        optional: false
        note: "Built by build_nfip_historical.py. Joined on [zcta_id, event] at training time."
      - key: "raw/geocertdb2026/zcta_county_crosswalk.parquet"
        description: "ZCTA-county crosswalk for spatial blocking"
        optional: true

    outputs:
      - key: "results/s035/r0_{scenario}.json"
        description: "R0 results: RunResult[] per (target x solver x split x fold)"
        per_scenario: true
        schema: &arm_result_schema
          experiment: "s035-model-ladder"
          phase: str
          scenario: str
          timestamp: ISO-8601
          seed: int
          representation: "R0|R1|R2"
          features_used: "[str]"
          features_missing: "[str]"
          fold_metadata: dict
          runs: "RunResult[]"
        run_result_schema: &run_result
          scenario: str
          target: str
          task: "regression|binary"
          solver: str
          split: "random|spatial_blocked"
          fold: "fold_0..fold_4"
          n_train: int
          n_test: int
          metrics: "{rmse, r2, mae, ...}"
          naive_baseline: "{rmse, r2, mae, ...}"
          features_used: int
          timestamp: ISO-8601
      - key: "results/s035/r0_{scenario}_predictions.parquet"
        description: "Per-ZCTA predictions (spatial_blocked, for Moran's I)"
        per_scenario: true
        columns: [zcta_id, target, solver, fold, y_true, y_pred]
      - key: "folds/{scenario}_folds.parquet"
        description: "Fold assignments (reused by R1, R2)"
        per_scenario: true
        columns: [zcta_id, random_fold, spatial_fold]

  # ── Phase 4a: Diagnostics R0 ──────────────────────────────────────────
  - phase_id: diagnostics_r0
    script: compute_diagnostics.py
    description: "Phase 4a: diag proxies from R0 outputs"
    per_scenario: false

    packages:
      - numpy
      - pandas
      - pyarrow

    features: null

    s3_artifacts:
      - key: "results/s035/r0_{scenario}.json"
        description: "R0 results JSON"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/r0_{scenario}_predictions.parquet"
        description: "R0 per-row predictions for Moran's I"
        per_scenario: true
        scenarios: *modelable
        optional: true
      - key: "raw/geocertdb2026/zcta_adjacency.parquet"
        description: "ZCTA adjacency edge list"
        optional: true

  # ── Phase 4.5a: Certificates R0 ───────────────────────────────────────
  - phase_id: certificates_r0
    script: compute_certificates.py
    description: "Phase 4.5a: RSN certificates from R0 results"
    per_scenario: false

    packages:
      - numpy
      - pandas
      - pyarrow

    features: null

    s3_artifacts:
      - key: "results/s035/r0_{scenario}.json"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/diagnostics_r0.json"
        description: "R0 diagnostics (from Phase 4a)"
      - key: "results/s035/geometry_kappa.json"
        description: "Phase 0.5 geometry kappa (kappa defaults to 0.0 if missing)"

  # ── Phase 2: R1 Hydrology ─────────────────────────────────────────────
  - phase_id: r1_hydrology
    script: train_r1_hydrology.py
    description: "Phase 2: R1 tabular + hydro + W-matrix features"
    per_scenario: true

    packages:
      - scikit-learn
      - numpy
      - pandas
      - pyarrow
      - scipy

    features:
      source: assembled_parquet
      required:
        - zcta_id
        - event

    s3_artifacts:
      - key: assembled_parquet
        description: "Assembled event features parquet"
      - key: "folds/{scenario}_folds.parquet"
        description: "Fold assignments from R0"
      - key: "processed/{scenario}/{scenario}_r1_supplement.parquet"
        description: "R1 hydrology supplement"
        optional: false

  # ── Phase 2 (ablation): R1 W-matrix Ablation ──────────────────────────
  - phase_id: r1_ablation
    script: train_r1_hydrology.py
    description: "Phase 2 (ablation): R1 W-matrix ablation battery (no-wlag, wlag-only, no-target-lag)"
    per_scenario: true
    depends_on: [r1_hydrology]

    packages:
      - scikit-learn
      - numpy
      - pandas
      - pyarrow
      - scipy

    features:
      source: assembled_parquet
      required:
        - zcta_id
        - event

    s3_artifacts:
      - key: assembled_parquet
        description: "Assembled event features parquet"
      - key: "folds/{scenario}_folds.parquet"
        description: "Fold assignments from R0"
      - key: "processed/{scenario}/{scenario}_r1_supplement.parquet"
        description: "R1 hydrology supplement"
      - key: "raw/geocertdb2026/zcta_adjacency.parquet"
        description: "Required for per-fold wlag recomputation (leakage prevention)"
        optional: true

    outputs:
      - key: "results/s035/r1_no_wlag_{scenario}.json"
        description: "R1 without W-matrix features"
        per_scenario: true
      - key: "results/s035/r1_wlag_only_{scenario}.json"
        description: "R1 with W-matrix only (no hydrology)"
        per_scenario: true
      - key: "results/s035/r1_no_target_lag_{scenario}.json"
        description: "R1 without target spatial lag"
        per_scenario: true
        optional: true

  # ── Phase 4b: Diagnostics R1 ──────────────────────────────────────────
  - phase_id: diagnostics_r1
    script: compute_diagnostics.py
    description: "Phase 4b: diag proxies from R1 outputs"
    per_scenario: false

    packages:
      - numpy
      - pandas
      - pyarrow

    features: null

    s3_artifacts:
      - key: "results/s035/r1_hydrology_{scenario}.json"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/r1_hydrology_{scenario}_predictions.parquet"
        per_scenario: true
        scenarios: *modelable
        optional: true
      - key: "raw/geocertdb2026/zcta_adjacency.parquet"
        optional: true

  # ── Phase 4.5b: Certificates R1 ───────────────────────────────────────
  - phase_id: certificates_r1
    script: compute_certificates.py
    description: "Phase 4.5b: RSN certificates from R1 results"
    per_scenario: false

    packages:
      - numpy
      - pandas
      - pyarrow

    features: null

    s3_artifacts:
      - key: "results/s035/r1_hydrology_{scenario}.json"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/diagnostics_r1.json"
      - key: "results/s035/geometry_kappa.json"
        description: "Phase 0.5 geometry kappa"

  # ── Phase 3: R2 Temporal ───────────────────────────────────────────────
  - phase_id: r2_temporal
    script: train_r2_temporal.py
    description: "Phase 3: R2 tabular + hydro + temporal features"
    per_scenario: true

    packages:
      - scikit-learn
      - numpy
      - pandas
      - pyarrow
      - scipy

    features:
      source: assembled_parquet
      required:
        - zcta_id
        - event

    s3_artifacts:
      - key: assembled_parquet
        description: "Assembled event features parquet"
      - key: "folds/{scenario}_folds.parquet"
        description: "Fold assignments from R0"
      - key: "processed/{scenario}/{scenario}_r2_supplement.parquet"
        description: "R2 temporal supplement"
        optional: false

  # ── Phase 4c + 4.5c: Diagnostics + Certificates R2 ────────────────────
  - phase_id: diagnostics_r2
    script: compute_diagnostics.py
    description: "Phase 4c: diag proxies from R2 outputs"
    per_scenario: false

    packages:
      - numpy
      - pandas
      - pyarrow

    features: null

    s3_artifacts:
      - key: "results/s035/r2_{scenario}.json"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/r2_{scenario}_predictions.parquet"
        per_scenario: true
        scenarios: *modelable
        optional: true
      - key: "raw/geocertdb2026/zcta_adjacency.parquet"
        optional: true

  - phase_id: certificates_r2
    script: compute_certificates.py
    description: "Phase 4.5c: RSN certificates from R2 results"
    per_scenario: false

    packages:
      - numpy
      - pandas
      - pyarrow

    features: null

    s3_artifacts:
      - key: "results/s035/r2_{scenario}.json"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/diagnostics_r2.json"
      - key: "results/s035/geometry_kappa.json"
        description: "Phase 0.5 geometry kappa"

  # ── Phase 5: Money Table ───────────────────────────────────────────────
  - phase_id: uplift_table
    script: compute_uplift_table.py
    description: "Phase 5: money table + hypothesis tests"
    per_scenario: false

    packages:
      - numpy
      - pandas
      - pyarrow
      - scipy

    features: null

    s3_artifacts:
      - key: "results/s035/r0_{scenario}.json"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/r1_hydrology_{scenario}.json"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/r2_{scenario}.json"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/r0_{scenario}_predictions.parquet"
        description: "Per-ZCTA predictions for spatially-blocked paired loss (§14)"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/r1_hydrology_{scenario}_predictions.parquet"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/r2_{scenario}_predictions.parquet"
        per_scenario: true
        scenarios: *modelable
      - key: "raw/geocertdb2026/zcta_county_crosswalk.parquet"
        description: "County crosswalk for spatial block aggregation (§14)"
      - key: "results/s035/diagnostics_r0.json"
      - key: "results/s035/diagnostics_r1.json"
      - key: "results/s035/diagnostics_r2.json"
      - key: "results/s035/certificates_r0.json"
        description: "Phase 4.5 certificates for RSCT quality signals"
      - key: "results/s035/certificates_r1.json"
      - key: "results/s035/certificates_r2.json"

  # ── Phase 6: DGM Routing ──────────────────────────────────────────────
  - phase_id: dgm_routing
    script: compute_dgm_routing.py
    description: "Phase 6: DGM morph routing analysis (dual strategy: kappa-first + gear-informed)"
    per_scenario: false

    packages:
      - numpy
      - pandas
      - pyarrow
      - scipy

    features: null

    s3_artifacts:
      - key: "results/s035/certificates_r0.json"
      - key: "results/s035/certificates_r1.json"
      - key: "results/s035/certificates_r2.json"
      - key: "results/s035/gearbox_warmup.json"
        description: "Phase 0.75 gearbox warmup signals for gear-informed routing"
        optional: true
      - key: "results/s035/r0_{scenario}.json"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/r1_hydrology_{scenario}.json"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/r2_{scenario}.json"
        per_scenario: true
        scenarios: *modelable

  # ── Phase 6b: Verdicts (Six-Geometry Sufficiency) ─────────────────────
  - phase_id: verdicts
    script: compute_verdicts.py
    description: "Phase 6b: Six-geometry sufficiency verdicts (prediction, ranking, clustering, transfer, relational, allocation)"
    per_scenario: false
    depends_on: [uplift_table, r1_ablation, certificates_r0, certificates_r1, certificates_r2, diagnostics_r0, diagnostics_r1, diagnostics_r2]

    packages:
      - numpy
      - pandas
      - pyarrow
      - scipy

    features: null

    s3_artifacts:
      - key: "results/s035/money_table.json"
        description: "Phase 5 uplift table (prediction verdict)"
      - key: "results/s035/sidecar/lisa_results.json"
        description: "LISA spatial analysis (clustering verdict)"
      - key: "results/s035/diagnostics_r0.json"
      - key: "results/s035/diagnostics_r1.json"
      - key: "results/s035/diagnostics_r2.json"
      - key: "results/s035/fast_validation.json"
        description: "FAST Spearman correlations (ranking verdict)"
        optional: true
      - key: "results/s035/r1_no_wlag_{scenario}.json"
        description: "R1 ablation: no W-matrix (relational verdict)"
        per_scenario: true
        scenarios: *modelable
      - key: "results/s035/r1_wlag_only_{scenario}.json"
        description: "R1 ablation: W-matrix only (relational verdict)"
        per_scenario: true
        scenarios: *modelable

    outputs:
      - key: "results/s035/verdicts.json"
        description: "All six geometry verdicts"

  # ── Phase R4.1-R4.2: VLM Input Preparation ─────────────────────────────
  - phase_id: r4_render_maps
    script: render_zcta_maps.py
    description: "Phase R4.1: Render ZCTA flood zone maps as PNG"
    per_scenario: true

    packages:
      - geopandas
      - matplotlib
      - pyarrow

    features:
      source: assembled_parquet
      required:
        - zcta_id
        - centroid_lat
        - centroid_lon

    s3_artifacts:
      - key: assembled_parquet
        description: "Assembled event features parquet"
      - key: "raw/fema_nfhl/{scenario}_nfhl.parquet"
        description: "FEMA NFHL flood zone polygons"
        optional: true

  - phase_id: r4_build_evidence
    script: build_zcta_evidence.py
    description: "Phase R4.2: Build structured text evidence per ZCTA"
    per_scenario: true

    packages:
      - pandas
      - pyarrow

    features:
      source: assembled_parquet
      required:
        - zcta_id

    s3_artifacts:
      - key: assembled_parquet
        description: "Assembled event features parquet"

  # ── Phase R4.3: VLM Assessment ────────────────────────────────────────
  - phase_id: r4_vlm_assessment
    script: run_vlm_assessment.py
    description: "Phase R4.3: Run 3-way VLM comparison (Claude/Gemini/Qwen)"
    per_scenario: true

    packages:
      - pandas
      - pyarrow
      - anthropic
      - openai
      - google-generativeai

    features: null

    s3_artifacts:
      - key: "maps/{scenario}/"
        description: "Rendered ZCTA map PNGs"
        prefix: true
