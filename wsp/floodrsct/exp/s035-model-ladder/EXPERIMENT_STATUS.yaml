# ===========================================================================
# S035 Experiment Status Registry
# ===========================================================================
#
# PURPOSE: Machine-readable source of truth for experiment completion status.
# Updated after each SageMaker job completes or fails.
#
# RULES:
# 1. Status is VERIFIED by checking S3 artifacts, not by reading DOE docs.
# 2. Every status change must include the verification date and method.
# 3. artifact_key is the S3 key that PROVES the experiment ran.
# 4. job_id is the SageMaker job name (for CloudWatch log tracing).
#
# IMPORTANT: Phase keys MUST match phase_id values in EXPERIMENT_CONTRACT.yaml
# so that verify_experiment_status.py --next-steps can resolve dependencies.
#
# STATUS VALUES:
#   DESIGNED    - DOE written, code exists, never launched
#   LAUNCHED    - SageMaker job submitted, not yet complete
#   COMPLETED   - S3 artifacts verified present
#   FAILED      - Job failed, no usable artifacts
#   STALE       - Artifacts exist but are outdated (upstream data changed)
#   BLOCKED     - Cannot run due to missing dependency
#
# VERIFICATION METHOD:
#   s3_ls       - aws s3 ls confirmed artifact exists
#   job_status  - aws sagemaker describe-processing-job confirmed
#   log_check   - CloudWatch logs confirmed output
# ===========================================================================

