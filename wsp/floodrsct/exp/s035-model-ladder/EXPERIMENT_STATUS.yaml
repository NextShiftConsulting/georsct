      Paper section 7.1 cites fabricated numbers from this experiment.
      Given TWCV finding (weights=1.0), ladder may show flat lines.
      MUST RUN to either confirm flat-line finding or discover step-level variation.
    blocker: "Needs SageMaker launcher. Script reads /tmp local paths, not S3."

