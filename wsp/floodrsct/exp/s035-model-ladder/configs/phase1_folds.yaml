# Phase 1: Fold Generation
# Create deterministic fold assignment columns
#
# NOTE: This config is a DESIGN DOCUMENT, not runtime config.
# Fold generation is handled by train_r0_baseline.py generate_folds().

scenarios:
  - houston
  - southwest_florida
  - nyc
  - riverside_coachella
  - new_orleans

seed: 42

splits:
  random:
    test_fraction: 0.2
    stratify_by: null   # pure random for A.1 leakage diagnostic
  spatial_blocked:
    n_folds: 5
    method: greedy_bin_packing  # balance fold sizes by ZCTA count
    fallback: zip3_blocking     # if < 5 counties, block by ZIP3 prefix

# Output: s3://swarm-floodrsct-data/folds/{scenario}_folds.parquet
