# the human who cleaned it up, and what was changed.  Provenance lives
# in this file and in per-script header comments -- never in git commit
# messages (per no-AI-attribution policy).
#
# Machine-readable so validate_experiment_readiness.py can verify
# every job script has a provenance entry.

experiment: s035-model-ladder
created: 2026-06-02

