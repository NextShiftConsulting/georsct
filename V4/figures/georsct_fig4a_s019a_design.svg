<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #111; }
    .title { font-size: 20px; font-weight: 700; }
    .stage { font-size: 16px; font-weight: 700; }
    .question { font-size: 15px; fill: #c5cae9; }
    .box-title { font-size: 15px; font-weight: 700; }
    .small { font-size: 13px; fill: #333; }
    .tiny { font-size: 12px; fill: #666; }
    .dim { font-size: 13px; fill: #555; font-weight: 600; }
    .tag { font-size: 11px; fill: #fff; font-weight: 700; }
    .shared { font-size: 11px; fill: #2e7d32; font-weight: 700; }
    .varied { font-size: 11px; fill: #c62828; font-weight: 700; }
    .diag { font-size: 14px; fill: #1a237e; font-weight: 600; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#283593"/><stop offset="100%" stop-color="#3949ab"/></linearGradient>
  </defs>

  <rect width="960" height="420" rx="10" fill="#fafbfc"/>
  <!-- Header -->
  <rect width="960" height="52" rx="10" fill="url(#hdr)"/>
  <rect y="42" width="960" height="10" fill="url(#hdr)"/>
  <text class="stage" x="24" y="22" fill="#e8eaf6">STAGE 1</text>
  <text class="title" x="100" y="22" fill="#fff">Factorial Diagnostic: Is the Embedding Ranking Solver-Dependent?</text>
  <text class="question" x="24" y="44">S019A — If the ranking changes when you swap the solver, architecture comparisons are not portable.</text>

  <!-- LEFT: What varies / what's shared -->
  <rect x="24" y="66" width="440" height="300" rx="8" fill="#fff" stroke="#bdbdbd"/>

  <!-- Shared block -->
  <rect x="36" y="76" width="416" height="80" rx="6" fill="#e8f5e9" stroke="#66bb6a" stroke-dasharray="4,2"/>
  <text class="shared" x="48" y="92">SHARED WITH STAGE 2</text>
  <text class="dim" x="48" y="110">Same ZCTAs (~32k), same embedding code, same spatial holdout</text>
  <text class="dim" x="48" y="128">Same core 3 embeddings: PCA32, Spatial Lag, GraphSAGE</text>
  <text class="tiny" x="48" y="146">County-holdout evaluation. 5-fold CV. Identical feature pipeline.</text>

  <!-- Varied block -->
  <rect x="36" y="166" width="416" height="190" rx="6" fill="#ffebee" stroke="#ef9a9a" stroke-dasharray="4,2"/>
  <text class="varied" x="48" y="182">VARIED IN STAGE 1</text>

  <text class="dim" x="48" y="202">3 solvers (tests whether ranking is portable)</text>
  <rect x="48" y="210" width="120" height="22" rx="4" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text class="small" x="60" y="225">HistGBDT</text>
  <rect x="178" y="210" width="120" height="22" rx="4" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text class="small" x="190" y="225">Ridge</text>
  <rect x="308" y="210" width="120" height="22" rx="4" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text class="small" x="320" y="225">MLP</text>

  <text class="dim" x="48" y="256">3 difficulty levels (tests whether effect size is constant)</text>
  <rect x="48" y="264" width="120" height="40" rx="5" fill="#c8e6c9" stroke="#66bb6a"/>
  <text class="box-title" x="68" y="282" fill="#2e7d32">Easy</text>
  <text class="tiny" x="68" y="296">Diabetes</text>
  <rect x="178" y="264" width="120" height="40" rx="5" fill="#fff9c4" stroke="#fdd835"/>
  <text class="box-title" x="198" y="282" fill="#f57f17">Medium</text>
  <text class="tiny" x="198" y="296">Pop. density</text>
  <rect x="308" y="264" width="120" height="40" rx="5" fill="#ffcdd2" stroke="#ef5350"/>
  <text class="box-title" x="328" y="282" fill="#c62828">Hard</text>
  <text class="tiny" x="328" y="296">Elevation</text>

  <text class="tiny" x="48" y="328">Full factorial: 3 embeddings x 3 solvers x 3 targets = 27 cells x 5 folds = 135 fits</text>
  <text class="tiny" x="48" y="344">Analysis: two-way ANOVA (embedding x solver) at each difficulty level</text>

  <!-- RIGHT: What this answers -->
  <rect x="484" y="66" width="456" height="300" rx="8" fill="#fff" stroke="#bdbdbd"/>
  <text class="box-title" x="500" y="90" fill="#283593">What Stage 1 answers</text>

  <!-- Q1 -->
  <rect x="500" y="102" width="54" height="18" rx="3" fill="#c62828"/>
  <text class="tag" x="507" y="115">D.2</text>
  <text class="diag" x="562" y="116">Is the embedding ranking solver-dependent?</text>
  <text class="small" x="500" y="138">If interaction eta-sq is small, the "best embedding"</text>
  <text class="small" x="500" y="154">does not change when you swap solvers. The ranking</text>
  <text class="small" x="500" y="170">is portable — architecture comparison is safe.</text>

  <!-- Q2 -->
  <rect x="500" y="190" width="76" height="18" rx="3" fill="#1565c0"/>
  <text class="tag" x="507" y="203">Gradient</text>
  <text class="diag" x="584" y="204">Is sensitivity binary or continuous?</text>
  <text class="small" x="500" y="226">If eta-sq differs across difficulty levels, reporting</text>
  <text class="small" x="500" y="242">a single mean effect size misrepresents both easy</text>
  <text class="small" x="500" y="258">and hard tasks. Per-regime reporting required.</text>

  <!-- Key finding -->
  <rect x="500" y="280" width="420" height="66" rx="6" fill="#e8eaf6" stroke="#7986cb"/>
  <text class="box-title" x="516" y="300" fill="#283593">Stage 1 finding (enables Stage 2)</text>
  <text class="small" x="516" y="318">Interaction eta-sq &lt; 0.04. Embedding eta-sq = 0.55-0.69</text>
  <text class="small" x="516" y="334">(monotonic with difficulty). Ranking is solver-invariant.</text>

  <!-- Bottom connection arrow -->
  <rect x="24" y="378" width="912" height="32" rx="6" fill="#e8eaf6" stroke="#7986cb"/>
  <text class="small" x="40" y="399" fill="#283593">Stage 1 validates solver-invariance --> Stage 2 fixes the solver and spends budget on embedding breadth (6 families) and task breadth (27 targets).</text>
</svg>
