<svg xmlns="http://www.w3.org/2000/svg" width="960" height="580" viewBox="0 0 960 580">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #111; }.title { font-size: 22px; font-weight: 700; }.subtitle { font-size: 15px; fill: #444; }.box-title { font-size: 16px; font-weight: 700; }.small { font-size: 14px; fill: #333; }.tiny { font-size: 13px; fill: #333; }.formula { font-size: 15px; font-style: italic; }.label { font-size: 13px; fill: #666; font-style: italic; }
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#333"/></marker></defs>
  <rect x="0" y="0" width="960" height="580" fill="#fff"/>
  <text class="title" x="40" y="36">GeoRSCT evaluates compatibility across problems, representations, and solvers</text>
  <text class="subtitle" x="40" y="58">Each ZCTA-level target is tested under six embedding families with a fixed HistGBDT solver to separate task difficulty from representation quality.</text>

  <!-- Problem P -->
  <rect x="30" y="120" width="140" height="110" rx="10" fill="#f8fafc" stroke="#111"/>
  <text class="box-title" x="55" y="150">Problem P</text>
  <text class="small" x="52" y="174">27 ZCTA targets</text>
  <text class="small" x="52" y="194">health, socio-econ,</text>
  <text class="small" x="52" y="214">environmental</text>

  <!-- Six embedding families -->
  <text class="label" x="240" y="82">Embedding families</text>

  <rect x="240" y="90" width="200" height="42" rx="8" fill="#eef6ff" stroke="#1f77b4"/>
  <text class="box-title" x="260" y="112">E1: PCA32</text>
  <text class="small" x="330" y="112">compact tabular (no spatial bias)</text>

  <rect x="240" y="140" width="200" height="42" rx="8" fill="#eef6ff" stroke="#1f77b4"/>
  <text class="box-title" x="260" y="162">E2: Spatial Lag</text>
  <text class="small" x="362" y="162">neighbor-aware features</text>

  <rect x="240" y="190" width="200" height="42" rx="8" fill="#eef6ff" stroke="#1f77b4"/>
  <text class="box-title" x="260" y="212">E3: GraphSAGE</text>
  <text class="small" x="362" y="212">learned message passing</text>

  <rect x="240" y="240" width="200" height="42" rx="8" fill="#e8f4f8" stroke="#17becf"/>
  <text class="box-title" x="260" y="262">E4: Geo-spatial</text>
  <text class="small" x="356" y="262">lat/lon + flood + SVI</text>

  <rect x="240" y="290" width="200" height="42" rx="8" fill="#e8f4f8" stroke="#17becf"/>
  <text class="box-title" x="260" y="312">E5: Domain features</text>
  <text class="small" x="392" y="312">all 106 columns</text>

  <rect x="240" y="340" width="200" height="42" rx="8" fill="#f5f0f0" stroke="#999"/>
  <text class="box-title" x="260" y="362" fill="#666">E6: Noisy control</text>
  <text class="small" x="380" y="362">PCA32 + N(0,1)</text>

  <!-- Arrows: P -> E -->
  <line x1="170" y1="155" x2="240" y2="111" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="165" x2="240" y2="161" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="175" x2="240" y2="211" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="180" x2="240" y2="261" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="170" y1="185" x2="240" y2="311" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="170" y1="190" x2="240" y2="361" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Solver (single: HistGBDT) -->
  <rect x="530" y="185" width="160" height="60" rx="10" fill="#f0fff0" stroke="#2ca02c"/>
  <text class="box-title" x="555" y="212">S: HistGBDT</text>
  <text class="small" x="555" y="230">fixed solver for all arms</text>

  <!-- Arrows: E -> S -->
  <line x1="440" y1="111" x2="530" y2="200" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="161" x2="530" y2="205" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="211" x2="530" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="261" x2="530" y2="215" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="440" y1="311" x2="530" y2="220" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="440" y1="361" x2="530" y2="230" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Measure box -->
  <rect x="780" y="115" width="140" height="200" rx="10" fill="#fff7e6" stroke="#ff7f0e"/>
  <text class="box-title" x="808" y="142">Measure</text>
  <text class="small" x="800" y="168">R, S_sup, N</text>
  <text class="small" x="800" y="190">alpha = R/(R+N)</text>
  <text class="small" x="800" y="212">kappa_int</text>
  <text class="small" x="800" y="234">kappa_gate</text>
  <text class="small" x="800" y="256">sigma</text>
  <text class="small" x="800" y="278">N-ceiling</text>
  <text class="small" x="800" y="300">theory kappa</text>

  <!-- Arrow: S -> Measure -->
  <line x1="690" y1="215" x2="780" y2="215" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Compatibility bar chart (6 embeddings, 1 solver) -->
  <rect x="30" y="400" width="430" height="150" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text class="box-title" x="55" y="426">Per-embedding R-squared (illustrative, diabetes)</text>

  <!-- Bar labels -->
  <text class="tiny" x="60" y="452">PCA32</text>
  <text class="tiny" x="60" y="472">Lag</text>
  <text class="tiny" x="60" y="492">GNN</text>
  <text class="tiny" x="60" y="512">Geo-sp</text>
  <text class="tiny" x="60" y="532">Domain</text>

  <!-- Bars (scaled: 0.73, 0.72, 0.78, 0.67, 0.79) max width ~280 at R2=1.0 -->
  <rect x="110" y="442" width="204" height="14" rx="3" fill="#c7e9c0" stroke="#fff"/>
  <text class="tiny" x="320" y="454">.733</text>
  <rect x="110" y="462" width="202" height="14" rx="3" fill="#c7e9c0" stroke="#fff"/>
  <text class="tiny" x="318" y="474">.721</text>
  <rect x="110" y="482" width="218" height="14" rx="3" fill="#a1d99b" stroke="#fff"/>
  <text class="tiny" x="334" y="494">.781</text>
  <rect x="110" y="502" width="188" height="14" rx="3" fill="#fdd0a2" stroke="#fff"/>
  <text class="tiny" x="304" y="514">.671</text>
  <rect x="110" y="522" width="221" height="14" rx="3" fill="#a1d99b" stroke="#fff"/>
  <text class="tiny" x="337" y="534">.790</text>

  <!-- N-ceiling annotation -->
  <line x1="221" y1="438" x2="221" y2="540" stroke="#d62728" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text class="tiny" x="226" y="548" fill="#d62728">N_ceil = 0.220</text>

  <!-- Noisy control (separate, much shorter) -->
  <rect x="30" y="555" width="430" height="20" rx="4" fill="#f5f0f0" stroke="#d0d7de"/>
  <text class="tiny" x="60" y="569" fill="#999">Noisy ctrl</text>
  <rect x="110" y="559" width="164" height="10" rx="2" fill="#fcbba1" stroke="#fff"/>
  <text class="tiny" x="280" y="569" fill="#999">.587 (floor)</text>

  <!-- Formula discipline -->
  <rect x="510" y="400" width="410" height="150" rx="8" fill="#f8fafc" stroke="#d0d7de"/>
  <text class="box-title" x="535" y="426">Formula discipline</text>
  <text class="formula" x="535" y="452">R-squared(f,t) -- per embedding-task pair</text>
  <text class="formula" x="535" y="476">N_ceiling(t) = 1 - max_k(R-sq_k(t))</text>
  <text class="formula" x="535" y="500">kappa_theory = D*/D (difficulty ratio)</text>
  <text class="formula" x="535" y="524">kappa_req(sigma) = kappa_base + lambda*sigma</text>

  <!-- Bracket: core 3 -->
  <path d="M228,92 L232,92 L232,230 L228,230" fill="none" stroke="#1f77b4" stroke-width="1.5"/>
  <text class="label" x="215" y="165" fill="#1f77b4" text-anchor="end">core 3</text>

  <!-- Bracket: extended -->
  <path d="M228,242 L232,242 L232,330 L228,330" fill="none" stroke="#17becf" stroke-width="1.5"/>
  <text class="label" x="215" y="290" fill="#17becf" text-anchor="end">extended</text>

  <!-- Bracket: control -->
  <text class="label" x="215" y="365" fill="#999" text-anchor="end">control</text>
</svg>
