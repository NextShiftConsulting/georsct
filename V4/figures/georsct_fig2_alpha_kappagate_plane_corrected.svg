<svg xmlns="http://www.w3.org/2000/svg" width="840" height="550" viewBox="0 0 840 550">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #111; }
    .title { font-size: 22px; font-weight: 700; }.subtitle { font-size: 15px; fill: #444; }.axis { font-size: 16px; font-weight: 700; }.region { font-size: 16px; font-weight: 700; }.small { font-size: 14px; fill: #333; }.note { font-size: 14px; fill: #444; }.formula { font-size: 15px; font-style: italic; }
  </style>
  <rect x="0" y="0" width="840" height="550" fill="#fff"/>
  <text class="title" x="40" y="36">GeoRSCT diagnostic plane</text>
  <text class="subtitle" x="40" y="58">α tracks signal purity; κ_gate tracks the enforced compatibility score; σ is reported separately as turbulence/heterogeneity.</text>
  <g transform="translate(95,100)">
    <rect x="0" y="0" width="520" height="340" fill="#ffffff" stroke="#111" stroke-width="1.5"/>
    <rect x="0" y="0" width="260" height="170" fill="#fbe4e4"/><rect x="260" y="0" width="260" height="170" fill="#e0f7e0"/><rect x="0" y="170" width="260" height="170" fill="#f3f4f6"/><rect x="260" y="170" width="260" height="170" fill="#fff2cc"/>
    <line x1="260" y1="0" x2="260" y2="340" stroke="#777" stroke-width="1" stroke-dasharray="5,5"/><line x1="0" y1="170" x2="520" y2="170" stroke="#777" stroke-width="1" stroke-dasharray="5,5"/>
    <text class="formula" x="18" y="-14">α = R/(R+N)</text><text class="formula" x="300" y="-14">κ_gate = min(κ_H, κ_L, κ_int)</text>
    <text class="region" x="24" y="40">High α, low κ_gate</text><text class="small" x="24" y="62">strong signal, wrong solver geometry</text><text class="small" x="24" y="80">representation–solver mismatch</text>
    <text class="region" x="292" y="40">High α, high κ_gate</text><text class="small" x="292" y="62">clean compatible signal</text><text class="small" x="292" y="80">best-case GeoRSCT regime</text>
    <text class="region" x="24" y="218">Low α, low κ_gate</text><text class="small" x="24" y="240">task difficulty plus mismatch</text><text class="small" x="24" y="258">raw score is hard to interpret</text>
    <text class="region" x="292" y="218">Low α, high κ_gate</text><text class="small" x="292" y="240">compatible solver, weak signal</text><text class="small" x="292" y="258">irreducible difficulty / contamination</text>
    <line x1="0" y1="340" x2="520" y2="340" stroke="#111" stroke-width="2"/><line x1="0" y1="340" x2="0" y2="0" stroke="#111" stroke-width="2"/>
    <text class="axis" x="335" y="378">κ_gate — enforced compatibility</text><text class="axis" x="-180" y="-16" transform="rotate(-90)">α — signal purity</text>
    <line x1="260" y1="0" x2="260" y2="340" stroke="#111" stroke-width="1" stroke-dasharray="2,6"/><text class="note" x="270" y="324">illustrative: κ_gate ≥ κ_req(σ)</text>
  </g>
  <text class="small" x="58" y="510">GeoRSCT additionally surfaces failures in the certificate machinery: label collapse · scalar inversion · gate degeneracy · threshold mismatch (§4)</text>
</svg>