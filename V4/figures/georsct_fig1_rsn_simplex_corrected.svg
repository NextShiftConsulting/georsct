<svg xmlns="http://www.w3.org/2000/svg" width="760" height="540" viewBox="0 0 760 540">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #111; }
    .title { font-size: 22px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #444; }
    .axis { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; fill: #333; }
    .label { font-size: 15px; font-weight: 600; }
    .formula { font-size: 16px; font-style: italic; }
  </style>
  <rect x="0" y="0" width="760" height="540" fill="#ffffff"/>
  <text class="title" x="40" y="36">GeoRSCT certificate as an R/Ssup/N simplex</text>
  <!-- subtitle row kept blank -->
  <polygon points="380,90 130,440 630,440" fill="#f8fafc" stroke="#111" stroke-width="1.5"/>
  <line x1="330" y1="160" x2="530" y2="160" stroke="#d0d7de" stroke-width="1"/>
  <line x1="280" y1="230" x2="580" y2="230" stroke="#d0d7de" stroke-width="1"/>
  <line x1="230" y1="300" x2="610" y2="300" stroke="#d0d7de" stroke-width="1"/>
  <line x1="180" y1="370" x2="620" y2="370" stroke="#d0d7de" stroke-width="1"/>
  <line x1="180" y1="370" x2="430" y2="440" stroke="#d0d7de" stroke-width="1"/>
  <line x1="230" y1="300" x2="480" y2="440" stroke="#d0d7de" stroke-width="1"/>
  <line x1="280" y1="230" x2="530" y2="440" stroke="#d0d7de" stroke-width="1"/>
  <line x1="330" y1="160" x2="580" y2="440" stroke="#d0d7de" stroke-width="1"/>
  <line x1="330" y1="160" x2="180" y2="440" stroke="#d0d7de" stroke-width="1"/>
  <line x1="280" y1="230" x2="230" y2="440" stroke="#d0d7de" stroke-width="1"/>
  <line x1="230" y1="300" x2="280" y2="440" stroke="#d0d7de" stroke-width="1"/>
  <line x1="180" y1="370" x2="330" y2="440" stroke="#d0d7de" stroke-width="1"/>
  <circle cx="380" cy="90" r="6" fill="#2ca02c"/><circle cx="130" cy="440" r="6" fill="#1f77b4"/><circle cx="630" cy="440" r="6" fill="#d62728"/>
  <text class="axis" x="355" y="72">R</text><text class="small" x="315" y="50">relevant geospatial signal</text>
  <text class="axis" x="88" y="468">Ssup</text><text class="small" x="72" y="488">superfluous structure</text>
  <text class="axis" x="646" y="468">N</text><text class="small" x="568" y="488">noise / contamination</text>
  <circle cx="380" cy="180" r="6" fill="#2ca02c" stroke="#111" stroke-width="0.5"/><text class="label" x="398" y="184">clean signal</text>
  <circle cx="235" cy="350" r="6" fill="#1f77b4" stroke="#111" stroke-width="0.5"/><text class="label" x="92" y="346">superfluous-heavy</text>
  <circle cx="530" cy="350" r="6" fill="#d62728" stroke="#111" stroke-width="0.5"/><text class="label" x="545" y="354">noise-heavy</text>
  <circle cx="380" cy="325" r="6" fill="#9467bd" stroke="#111" stroke-width="0.5"/><text class="label" x="398" y="329">ambiguous / mixed</text>
  <rect x="70" y="90" width="245" height="78" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text class="formula" x="90" y="118">R + Ssup + N = 1</text>
  <text class="formula" x="90" y="144">α = R / (R + N)</text>
  <rect x="470" y="90" width="220" height="88" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text class="small" x="488" y="116">GeoRSCT use:</text><text class="small" x="488" y="136">Does a model score reflect</text><text class="small" x="488" y="152">usable signal, extra structure,</text><text class="small" x="488" y="168">or task/noise difficulty?</text>
</svg>