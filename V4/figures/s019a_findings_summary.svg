<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#2c5282"/>
    </linearGradient>
    <linearGradient id="passGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fff4"/>
      <stop offset="100%" stop-color="#e6ffed"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="12" fill="#f7fafc" filter="url(#shadow)"/>
  <rect width="960" height="520" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect width="960" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect y="40" width="960" height="12" fill="url(#headerGrad)"/>
  <text x="480" y="33" text-anchor="middle" fill="white" font-size="22" font-weight="600">S019A Findings: What Works Without Calibration Fix</text>

  <!-- Column headers -->
  <rect x="16" y="64" width="210" height="36" rx="6" fill="#edf2f7"/>
  <rect x="234" y="64" width="300" height="36" rx="6" fill="#edf2f7"/>
  <rect x="542" y="64" width="402" height="36" rx="6" fill="#edf2f7"/>
  <text x="121" y="87" text-anchor="middle" fill="#2d3748" font-size="16" font-weight="700">Finding</text>
  <text x="384" y="87" text-anchor="middle" fill="#2d3748" font-size="16" font-weight="700">Evidence</text>
  <text x="743" y="87" text-anchor="middle" fill="#2d3748" font-size="16" font-weight="700">Paper Claim Supported</text>

  <!-- Row 1: eta-squared gradient (HEADLINE) -->
  <rect x="16" y="108" width="928" height="68" rx="6" fill="#ebf8ff" stroke="#bee3f8" stroke-width="1"/>
  <rect x="20" y="112" width="4" height="60" rx="2" fill="#3182ce"/>
  <text x="32" y="134" fill="#2b6cb0" font-size="16" font-weight="700">Sensitivity gradient</text>
  <text x="32" y="152" fill="#2b6cb0" font-size="15">(IG-3) HEADLINE</text>
  <text x="242" y="134" fill="#2d3748" font-size="15">eta-sq(embedding): 0.549 (diabetes)</text>
  <text x="242" y="152" fill="#2d3748" font-size="15">&lt; 0.618 (pop density) &lt; 0.687 (elevation)</text>
  <text x="242" y="168" fill="#718096" font-size="14">All p &lt; 0.001; monotonic increase confirmed</text>
  <text x="550" y="134" fill="#2d3748" font-size="15">Embedding sensitivity scales with task</text>
  <text x="550" y="152" fill="#2d3748" font-size="15">difficulty -- not binary "works/doesn't"</text>
  <text x="550" y="168" fill="#718096" font-size="14">Stronger claim than original IG-1 invariance hyp.</text>

  <!-- Row 2: Embedding significant everywhere -->
  <rect x="16" y="184" width="928" height="60" rx="6" fill="url(#passGrad)" stroke="#c6f6d5" stroke-width="1"/>
  <rect x="20" y="188" width="4" height="52" rx="2" fill="#38a169"/>
  <text x="32" y="210" fill="#276749" font-size="16" font-weight="700">Embedding effect</text>
  <text x="32" y="228" fill="#276749" font-size="15">(IG-1 revised + IG-2)</text>
  <text x="242" y="210" fill="#2d3748" font-size="15">ANOVA F: 39.6 (diabetes), 130.7 (pop),</text>
  <text x="242" y="228" fill="#2d3748" font-size="15">197.8 (elevation); all p &lt; 0.001</text>
  <text x="550" y="210" fill="#2d3748" font-size="15">Architecture choice matters for ALL geo-tasks,</text>
  <text x="550" y="228" fill="#2d3748" font-size="15">but magnitude depends on problem regime</text>

  <!-- Row 3: Theory kappa discriminates -->
  <rect x="16" y="252" width="928" height="60" rx="6" fill="url(#passGrad)" stroke="#c6f6d5" stroke-width="1"/>
  <rect x="20" y="256" width="4" height="52" rx="2" fill="#38a169"/>
  <text x="32" y="274" fill="#276749" font-size="16" font-weight="700">Theory kappa</text>
  <text x="32" y="292" fill="#276749" font-size="15">discriminates</text>
  <text x="242" y="274" fill="#2d3748" font-size="15">Spearman(R-sq, theory kappa) = 0.482</text>
  <text x="242" y="292" fill="#2d3748" font-size="15">overall (p &lt; 0.001); per-target: 0.23--0.44</text>
  <text x="550" y="274" fill="#2d3748" font-size="15">D*/D correctly ranks embedding quality</text>
  <text x="550" y="292" fill="#2d3748" font-size="15">even when RSN simplex is degenerate</text>

  <!-- Row 4: N-ceiling pattern -->
  <rect x="16" y="320" width="928" height="60" rx="6" fill="url(#passGrad)" stroke="#c6f6d5" stroke-width="1"/>
  <rect x="20" y="324" width="4" height="52" rx="2" fill="#38a169"/>
  <text x="32" y="342" fill="#276749" font-size="16" font-weight="700">N-ceiling pattern</text>
  <text x="32" y="360" fill="#276749" font-size="15"></text>
  <text x="242" y="342" fill="#2d3748" font-size="15">N_ceil: 0.220 (diabetes), 0.187 (pop),</text>
  <text x="242" y="360" fill="#2d3748" font-size="15">0.281 (elevation) -- varies by target</text>
  <text x="550" y="342" fill="#2d3748" font-size="15">Task difficulty is a first-class evaluation</text>
  <text x="550" y="360" fill="#2d3748" font-size="15">axis, measurable from solver residuals</text>

  <!-- Row 5: Solver robustness -->
  <rect x="16" y="388" width="928" height="60" rx="6" fill="url(#passGrad)" stroke="#c6f6d5" stroke-width="1"/>
  <rect x="20" y="392" width="4" height="52" rx="2" fill="#38a169"/>
  <text x="32" y="410" fill="#276749" font-size="16" font-weight="700">Solver robustness</text>
  <text x="32" y="428" fill="#276749" font-size="15"></text>
  <text x="242" y="410" fill="#2d3748" font-size="15">Solver eta-sq: 0.141--0.216 across targets;</text>
  <text x="242" y="428" fill="#2d3748" font-size="15">interaction eta-sq: 0.035--0.091 (small)</text>
  <text x="550" y="410" fill="#2d3748" font-size="15">Embedding ranking is stable across solver</text>
  <text x="550" y="428" fill="#2d3748" font-size="15">families -- not an artifact of model choice</text>

  <!-- Footer note -->
  <rect x="16" y="460" width="928" height="48" rx="6" fill="#fff5f5" stroke="#fed7d7" stroke-width="1"/>
  <text x="32" y="480" fill="#c53030" font-size="15" font-weight="600">Known limitation:</text>
  <text x="170" y="480" fill="#742a2a" font-size="15">RSN simplex, alpha, gate decisions are degenerate (per-arm tercile calibration -- see Appendix F).</text>
  <text x="32" y="498" fill="#742a2a" font-size="15">Theory kappa (D*/D) and R-sq are unaffected. IG-4 (gate divergence) and IG-5 (simplex integrity) require shared-reference recalibration.</text>
</svg>
