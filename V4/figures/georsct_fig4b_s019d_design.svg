<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #111; }
    .title { font-size: 20px; font-weight: 700; }
    .stage { font-size: 16px; font-weight: 700; }
    .question { font-size: 15px; fill: #c8e6c9; }
    .box-title { font-size: 15px; font-weight: 700; }
    .small { font-size: 13px; fill: #333; }
    .tiny { font-size: 12px; fill: #666; }
    .dim { font-size: 13px; fill: #555; font-weight: 600; }
    .tag { font-size: 11px; fill: #fff; font-weight: 700; }
    .shared { font-size: 11px; fill: #2e7d32; font-weight: 700; }
    .varied { font-size: 11px; fill: #c62828; font-weight: 700; }
    .fixed { font-size: 11px; fill: #e65100; font-weight: 700; }
    .diag { font-size: 14px; fill: #1b5e20; font-weight: 600; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1b5e20"/><stop offset="100%" stop-color="#2e7d32"/></linearGradient>
  </defs>

  <rect width="960" height="420" rx="10" fill="#fafbfc"/>
  <!-- Header -->
  <rect width="960" height="52" rx="10" fill="url(#hdr)"/>
  <rect y="42" width="960" height="10" fill="url(#hdr)"/>
  <text class="stage" x="24" y="22" fill="#c8e6c9">STAGE 2</text>
  <text class="title" x="100" y="22" fill="#fff">Breadth Diagnostic: Where Is the Ceiling the Binding Constraint?</text>
  <text class="question" x="24" y="44">S019D — Solver fixed (justified by Stage 1). Budget spent on embedding breadth and task breadth.</text>

  <!-- LEFT: What varies / what's shared / what's fixed -->
  <rect x="24" y="66" width="440" height="300" rx="8" fill="#fff" stroke="#bdbdbd"/>

  <!-- Shared block -->
  <rect x="36" y="76" width="416" height="58" rx="6" fill="#e8f5e9" stroke="#66bb6a" stroke-dasharray="4,2"/>
  <text class="shared" x="48" y="92">SHARED WITH STAGE 1</text>
  <text class="dim" x="48" y="110">Same ZCTAs (~32k), same embedding code, same spatial holdout</text>
  <text class="tiny" x="48" y="126">County-holdout evaluation. 5-fold CV. Identical feature pipeline.</text>

  <!-- Fixed block (justified by Stage 1) -->
  <rect x="36" y="142" width="416" height="42" rx="6" fill="#fff3e0" stroke="#ffcc80" stroke-dasharray="4,2"/>
  <text class="fixed" x="48" y="158">FIXED (JUSTIFIED BY STAGE 1: SOLVER-INVARIANT)</text>
  <text class="dim" x="48" y="176">1 solver: HistGBDT — isolates embedding effect from solver noise</text>

  <!-- Varied block -->
  <rect x="36" y="192" width="416" height="164" rx="6" fill="#ffebee" stroke="#ef9a9a" stroke-dasharray="4,2"/>
  <text class="varied" x="48" y="208">SCALED UP IN STAGE 2</text>

  <text class="dim" x="48" y="228">6 embedding families (3 core + 3 extended)</text>
  <rect x="48" y="236" width="125" height="20" rx="4" fill="#e3f2fd" stroke="#90caf9"/>
  <text class="tiny" x="56" y="250">PCA32 (no spatial bias)</text>
  <rect x="181" y="236" width="125" height="20" rx="4" fill="#e3f2fd" stroke="#90caf9"/>
  <text class="tiny" x="189" y="250">Spatial Lag (neighbor)</text>
  <rect x="314" y="236" width="125" height="20" rx="4" fill="#e3f2fd" stroke="#90caf9"/>
  <text class="tiny" x="322" y="250">GraphSAGE (learned)</text>
  <rect x="48" y="260" width="125" height="20" rx="4" fill="#e0f7fa" stroke="#80deea"/>
  <text class="tiny" x="56" y="274">Geo-spatial (context)</text>
  <rect x="181" y="260" width="125" height="20" rx="4" fill="#e0f7fa" stroke="#80deea"/>
  <text class="tiny" x="189" y="274">Domain (all 106 cols)</text>
  <rect x="314" y="260" width="125" height="20" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
  <text class="tiny" x="322" y="274" fill="#777">Noisy control (floor)</text>

  <text class="dim" x="48" y="300">27 CONUS targets spanning 5.3x difficulty range</text>
  <rect x="48" y="308" width="80" height="18" rx="3" fill="#fff3e0" stroke="#ffcc80"/>
  <text class="tiny" x="56" y="321">Health (21)</text>
  <rect x="136" y="308" width="100" height="18" rx="3" fill="#fff3e0" stroke="#ffcc80"/>
  <text class="tiny" x="144" y="321">Socioeconomic (3)</text>
  <rect x="244" y="308" width="108" height="18" rx="3" fill="#fff3e0" stroke="#ffcc80"/>
  <text class="tiny" x="252" y="321">Environmental (3)</text>
  <text class="tiny" x="48" y="348">6 embeddings x 27 targets x 1 solver x 5 folds = 810 fits</text>

  <!-- RIGHT: What this answers -->
  <rect x="484" y="66" width="456" height="300" rx="8" fill="#fff" stroke="#bdbdbd"/>
  <text class="box-title" x="500" y="90" fill="#1b5e20">What Stage 2 answers</text>

  <!-- Q1 -->
  <rect x="500" y="102" width="54" height="18" rx="3" fill="#c62828"/>
  <text class="tag" x="507" y="115">D.1</text>
  <text class="diag" x="562" y="116">Does aggregate reporting hide task structure?</text>
  <text class="small" x="500" y="138">N-ceiling ranges 0.084 to 0.444 (5.3x). A single mean</text>
  <text class="small" x="500" y="154">R-squared is dominated by easy tasks. Per-task ceiling</text>
  <text class="small" x="500" y="170">exposes which tasks are genuinely hard vs under-featured.</text>

  <!-- Q2 -->
  <rect x="500" y="186" width="54" height="18" rx="3" fill="#c62828"/>
  <text class="tag" x="507" y="199">D.2</text>
  <text class="diag" x="562" y="200">Where is switching embeddings unproductive?</text>
  <text class="small" x="500" y="222">Tasks where 5-family spread is small relative to their</text>
  <text class="small" x="500" y="238">ceiling are embedding-invariant: better features, not</text>
  <text class="small" x="500" y="254">better architectures, is the productive intervention.</text>

  <!-- Q3: Feature routing -->
  <rect x="500" y="270" width="70" height="18" rx="3" fill="#1565c0"/>
  <text class="tag" x="507" y="283">Routing</text>
  <text class="diag" x="578" y="284">Which feature family wins where?</text>
  <text class="small" x="500" y="306">Domain features wins 16/27 (brute feature breadth).</text>
  <text class="small" x="500" y="322">GNN wins 7/27 (learned spatial structure matters).</text>
  <text class="small" x="500" y="338">Geo-spatial wins 4/27 (geographic context decisive).</text>
  <text class="small" x="500" y="354">Tells you WHERE to invest next.</text>

  <!-- Bottom connection -->
  <rect x="24" y="378" width="912" height="32" rx="6" fill="#e8f5e9" stroke="#66bb6a"/>
  <text class="small" x="40" y="399" fill="#1b5e20">Stage 2 finding: N-ceiling spectrum (0.084-0.444) is the dominant evaluation axis. Solver spread (0.041) is 9x smaller. The ceiling is the binding constraint.</text>
</svg>
