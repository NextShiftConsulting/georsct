<svg xmlns="http://www.w3.org/2000/svg" width="840" height="550" viewBox="0 0 840 550">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #111; }.title { font-size: 22px; font-weight: 700; }.subtitle { font-size: 15px; fill: #444; }.axis { font-size: 16px; font-weight: 700; }.small { font-size: 14px; fill: #333; }.label { font-size: 16px; font-weight: 700; }.formula { font-size: 16px; font-style: italic; }
  </style>
  <rect x="0" y="0" width="840" height="550" fill="#fff"/>
  <text class="title" x="40" y="36">Compatibility admissibility under turbulence</text>
  <text class="subtitle" x="40" y="58">Gate 3 compares κ_gate against a σ-adjusted requirement κ_req(σ).</text>
  <g transform="translate(95,85)">
    <rect x="0" y="0" width="540" height="340" fill="#fff" stroke="#111" stroke-width="1.5"/>
    <polygon points="0,190 540,70 540,0 0,0" fill="#e0f7e0"/><polygon points="0,190 540,70 540,340 0,340" fill="#fbe4e4"/>
    <line x1="0" y1="190" x2="540" y2="70" stroke="#111" stroke-width="2.5"/><text class="formula" x="248" y="54">κ_req(σ) = κ_base + λσ</text>
    <line x1="0" y1="190" x2="540" y2="190" stroke="#777" stroke-width="1" stroke-dasharray="5,5"/><text class="small" x="12" y="183">κ_base</text>
    <text class="label" x="48" y="70">Admissible</text><text class="small" x="48" y="90">κ_gate ≥ κ_req(σ)</text>
    <text class="label" x="310" y="260">RE_ENCODE / repair needed</text><text class="small" x="310" y="280">κ_gate &lt; κ_req(σ)</text>
    <circle cx="120" cy="130" r="6" fill="#2ca02c" stroke="#111" stroke-width="0.5"/><text class="small" x="134" y="134">passes Gate 3</text>
    <circle cx="420" cy="145" r="6" fill="#d62728" stroke="#111" stroke-width="0.5"/><text class="small" x="434" y="149">fails as σ rises</text>
    <line x1="0" y1="340" x2="540" y2="340" stroke="#111" stroke-width="2"/><line x1="0" y1="340" x2="0" y2="0" stroke="#111" stroke-width="2"/>
    <text class="axis" x="350" y="378">σ — turbulence / heterogeneity</text><text class="axis" x="-180" y="-18" transform="rotate(-90)">κ_gate — execution score</text>
  </g>
  <rect x="655" y="105" width="145" height="205" rx="8" fill="#ffffff" stroke="#d0d7de"/><text class="label" x="674" y="132">GeoRSCT caveat</text><text class="small" x="674" y="158">In geospatial data,</text><text class="small" x="674" y="176">high σ may reflect</text><text class="small" x="674" y="194">spatial heterogeneity,</text><text class="small" x="674" y="212">not solver chaos.</text><text class="small" x="674" y="244">Therefore λ and</text><text class="small" x="674" y="262">κ_base are reported</text><text class="small" x="674" y="280">as gate-policy</text><text class="small" x="674" y="298">parameters.</text>
  <text class="small" x="112" y="482">Canonical turbulence: σ = std({κ_i}_{i=1}^m).</text><text class="small" x="112" y="500">Use this figure for gate-policy explanation, not as a default GeoRSCT leaderboard metric.</text>
</svg>